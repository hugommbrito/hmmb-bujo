    PatchedHabitDayEntryUpdate:
      type: object
      description: |-
        PATCH de uma linha: marcar/desmarcar ``value`` e/ou correção avulsa.

        ``value`` ``allow_null`` (desmarcar booleano → None). ``weightAtTime``/
        ``metaAtTime``/``bonusAtTime`` opcionais (correção de dia passado). ``habit``/
        ``date`` são identidade imutável do snapshot — enviá-los é rejeitado (400).
      properties:
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        weightAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        metaAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        bonusAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        multiplierAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
