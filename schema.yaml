        schema:
          type: boolean
        description: Inclui campos com active=false (desativados).
      tags:
      - health-field-definitions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthFieldDefinition'
          description: ''
    post:
      operationId: health_field_definitions_create
      tags:
      - health-field-definitions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthFieldCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthFieldDefinition'
          description: ''
  /api/health-field-definitions/{id}/:
    patch:
      operationId: health_field_definitions_partial_update
      description: |-
        Edita ``name``/``enum_options``/``display_order``/``active`` (AC2, AC4).

        Desativar/reativar é ``PATCH {active: false/true}`` — Saúde não versiona, então
        não há sub-recurso ``versions/`` (precedente ``RecurringTaskTemplate.active``).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - health-field-definitions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHealthFieldUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthFieldDefinition'
          description: ''
  /api/health-logs/:
    put:
      operationId: health_logs_update
      description: |-
        Upsert-merge validado do dia (Story 7.2, AC1/AC4): ``PUT /api/health-logs/``.

        Body ``{date, values}`` → grava só se **todos** os valores forem válidos
        (validação atômica na camada de serviço contra as definições ativas). Merge:
        preserva chaves não submetidas (inclusive de campos inativos — AC4). ``DomainError``
        da validação de conteúdo vira 409 (``custom_exception_handler``).
      tags:
      - health-logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthLogWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthLog'
          description: ''
  /api/health-logs/daily/:
    get:
      operationId: health_logs_daily_retrieve
      description: |-
        Read-model do ritual matinal (Story 7.2, AC3): ``GET /api/health-logs/daily/``.

        Retorna ``{yesterday, today, fields}`` — **ontem no topo, hoje abaixo**. As datas
        são resolvidas pela autoridade temporal do servidor (``today_for``, fuso do
        usuário); o frontend nunca calcula "ontem". Espelha o precedente ``HabitDayView``
        (GET read-model resolvendo o dia; escrita separada).
      tags:
      - health-logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDaily'
          description: ''
components:
  schemas:
    ArchiveEntry:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        weekStart:
          type: string
          format: date
          nullable: true
        monthFirst:
          type: string
          format: date
          nullable: true
      required:
      - type
    BlankEnum:
      enum:
      - ''
    BrainDumpCount:
      type: object
      properties:
        count:
          type: integer
      required:
      - count
    BrainDumpItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        targetLog:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TargetLogEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        createdAt:
          type: string
          format: date-time
          readOnly: true
      required:
      - createdAt
      - id
      - title
    BrainDumpItemCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        targetLog:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TargetLogEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - title
    BrainDumpItemProcess:
      type: object
      properties:
        destination:
          $ref: '#/components/schemas/BrainDumpItemProcessDestinationEnum'
        monthFirst:
          type: string
          format: date
        scheduledDate:
          type: string
          format: date
          nullable: true
      required:
      - destination
    BrainDumpItemProcessDestinationEnum:
      enum:
      - today
      - week
      - month
      - future
      type: string
      description: |-
        * `today` - today
        * `week` - week
        * `month` - month
        * `future` - future
    CatchUpQueue:
      type: object
      properties:
        monthlyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        weeklyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        dailyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - dailyTasks
      - monthlyTasks
      - weeklyTasks
    CategoryEnum:
      enum:
      - teal
      - purple
      - pink
      - yellow
      - green
      - blue
      type: string
      description: |-
        * `teal` - Teal
        * `purple` - Purple
        * `pink` - Pink
        * `yellow` - Yellow
        * `green` - Green
        * `blue` - Blue
    DayTypeEnum:
      enum:
      - weekday
      - weekend
      - holiday
      type: string
      description: |-
        * `weekday` - Weekday
        * `weekend` - Weekend
        * `holiday` - Holiday
    EisenhowerEnum:
      enum:
      - ui
      - u
      - i
      - none
      type: string
      description: |-
        * `ui` - Urgent Important
        * `u` - Urgent
        * `i` - Important
        * `none` - None
    FutureLogMonthGroup:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - month
      - tasks
      - year
    GroupMultipliers:
      type: object
      description: |-
        Config vigente do grupo (read): chaves nomeadas ``weekend``/``holiday``.

        Sem enum ``day_type`` no wire (evita colisão de ``DayTypeEnum`` — ver Dev Notes
        da story). ``weekday`` nunca aparece (= 1.0 implícito).
      properties:
        weekend:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
        holiday:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
      required:
      - holiday
      - weekend
    Habit:
      type: object
      description: Hábito + campos da versão vigente hoje (``obj.current_version``).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        emoticon:
          type: string
          maxLength: 16
        group:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/HabitTypeEnum'
        unit:
          type: string
          maxLength: 32
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        active:
          type: boolean
          readOnly: true
        meta:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        bonus:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        effectiveFrom:
          type: string
          format: date
          readOnly: true
      required:
      - active
      - bonus
      - effectiveFrom
      - group
      - id
      - meta
      - name
      - type
      - weight
    HabitChange:
      type: object
      description: |-
        Uma mudança real de config no diff de versões. ``field`` = **CharField**
        (weight/meta/bonus/active/created) — NÃO ChoiceField, para não emitir enum novo.
        ``before``/``after`` — **NUNCA** ``from``/``to`` (``from`` é reservada em Python);
        string (allow_null) por serem valores heterogêneos (decimais/booleanos).
      properties:
        field:
          type: string
        before:
          type: string
          nullable: true
        after:
          type: string
          nullable: true
      required:
      - after
      - before
      - field
    HabitCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        emoticon:
          type: string
          default: ''
          maxLength: 16
        unit:
          type: string
          default: ''
          maxLength: 32
        group:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/HabitTypeEnum'
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        meta:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        bonus:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
      required:
      - group
      - name
      - type
      - weight
    HabitDay:
      type: object
      description: 'Payload do tracker do dia: % total, % por grupo, tipo do dia e
        as linhas.'
      properties:
        date:
          type: string
          format: date
        totalCompletion:
          type: integer
        dayType:
          $ref: '#/components/schemas/DayTypeEnum'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/HabitDayGroup'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/HabitDayEntry'
      required:
      - date
      - dayType
      - entries
      - groups
      - totalCompletion
    HabitDayEntry:
      type: object
      description: |-
        Uma linha do tracker do dia: identidade do hábito + snapshot congelado.

        Expõe a identidade do hábito (``name``/``emoticon``/``type``/``group``/``unit``)
        junto do estado do dia (``value``/``*_at_time``). ``type`` reusa ``HabitTypeEnum``
        via ``ChoiceField`` (mesmo override de enum da 6.1).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        habitId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        emoticon:
          type: string
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/HabitTypeEnum'
          readOnly: true
        group:
          type: string
          format: uuid
          readOnly: true
        unit:
          type: string
          readOnly: true
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        weightAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        metaAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        bonusAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        dayType:
          allOf:
          - $ref: '#/components/schemas/DayTypeEnum'
          readOnly: true
        multiplierAtTime:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
      required:
      - dayType
      - emoticon
      - group
      - habitId
      - id
      - name
      - type
      - unit
      - weightAtTime
    HabitDayGroup:
      type: object
      description: 'Cabeçalho de grupo do tracker: nome + % ponderado do grupo.'
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        completion:
          type: integer
      required:
      - completion
      - id
      - name
    HabitDayType:
      type: object
      description: |-
        Tipo de dia de um dia de calendário do range (para o sombreamento de ritmo,
        inclusive em dias-lacuna). Reusa ``DayTypeEnum``.
      properties:
        date:
          type: string
          format: date
        dayType:
          $ref: '#/components/schemas/DayTypeEnum'
      required:
      - date
      - dayType
    HabitGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        displayOrder:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - name
    HabitGroupCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
      required:
      - name
    HabitHistoryDay:
      type: object
      description: |-
        Um dia no range de histórico. ``total_completion`` **allow_null** = lacuna
        honesta (dia nunca aberto); ``groups`` traz o % ponderado POR GRUPO (AC1).
      properties:
        date:
          type: string
          format: date
        dayType:
          $ref: '#/components/schemas/DayTypeEnum'
        totalCompletion:
          type: integer
          nullable: true
        groups:
          type: array
          items:
            $ref: '#/components/schemas/HabitDayGroup'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/HabitDayEntry'
      required:
      - date
      - dayType
      - entries
      - groups
      - totalCompletion
    HabitHistoryRange:
      type: object
      description: 'Payload do intervalo: alimenta a grade hábitos × dias e o detalhe
        por-data.'
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        habits:
          type: array
          items:
            $ref: '#/components/schemas/HabitSlim'
        days:
          type: array
          items:
            $ref: '#/components/schemas/HabitHistoryDay'
      required:
      - days
      - end
      - habits
      - start
    HabitSeries:
      type: object
      description: Série + eventos + ritmo de UM hábito no range.
      properties:
        habit:
          $ref: '#/components/schemas/HabitSlim'
        points:
          type: array
          items:
            $ref: '#/components/schemas/HabitSeriesPoint'
        events:
          type: array
          items:
            $ref: '#/components/schemas/HabitVersionEvent'
        dayTypes:
          type: array
          items:
            $ref: '#/components/schemas/HabitDayType'
      required:
      - events
      - habit
      - points
    HabitSeriesPoint:
      type: object
      description: |-
        Um ponto diário da série: ``value`` (allow_null), ``effective_weight`` e o
        ``day_type`` congelado da linha (reusa ``DayTypeEnum``).
      properties:
        date:
          type: string
          format: date
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        effectiveWeight:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        dayType:
          $ref: '#/components/schemas/DayTypeEnum'
      required:
      - date
      - dayType
      - effectiveWeight
      - value
    HabitSlim:
      type: object
      description: |-
        Identidade do hábito para history/series — **sem** ``current_version``.

        Os serviços de histórico derivam identidade de ``entry.habit``/``habit`` (Habit
        puro, sem ``current_version`` anexada). ``HabitSerializer`` estouraria
        ``AttributeError`` (lê ``current_version.weight`` etc.), por isso este slim.
        ``type`` reusa ``HabitTypeEnum`` (já pinado); nenhum enum novo.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        emoticon:
          type: string
          maxLength: 16
        type:
          allOf:
          - $ref: '#/components/schemas/HabitTypeEnum'
          readOnly: true
        unit:
          type: string
          maxLength: 32
        group:
          type: string
          format: uuid
          readOnly: true
      required:
      - group
      - id
      - name
      - type
    HabitTypeEnum:
      enum:
      - boolean
      - numeric
      type: string
      description: |-
        * `boolean` - Boolean
        * `numeric` - Numeric
    HabitVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        habit:
          type: string
          format: uuid
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        active:
          type: boolean
        meta:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        bonus:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        effectiveFrom:
          type: string
          format: date
      required:
      - effectiveFrom
      - habit
      - id
      - weight
    HabitVersionCreate:
      type: object
      description: |-
        Nova versão prospectiva: mudança de peso/meta/bonus e/ou desativar/reativar.

        Todos os campos são opcionais — os não informados herdam da versão vigente.
      properties:
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        meta:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        bonus:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        active:
          type: boolean
    HabitVersionEvent:
      type: object
      description: Um marcador datado de mudança real (uma transição de versão).
      properties:
        effectiveFrom:
          type: string
          format: date
        changes:
          type: array
          items:
            $ref: '#/components/schemas/HabitChange'
      required:
      - changes
      - effectiveFrom
    HealthDaily:
      type: object
      description: |-
        Read-model do ritual matinal (AC3): ``{yesterday, today, fields}``.

        ``yesterday``/``today`` são ``{date, values}`` (datas resolvidas pelo servidor via
        ``today_for``); ``fields`` são as definições **ativas** (reuso do serializer de
        7.1). ``fields`` é um nome de field declarado — o ``SerializerMetaclass`` o move
        para ``_declared_fields`` (``attrs.pop``), então não colide com a property
        ``Serializer.fields``.
      properties:
        yesterday:
          $ref: '#/components/schemas/HealthDaySection'
        today:
          $ref: '#/components/schemas/HealthDaySection'
        fields:
          type: array
          items:
            $ref: '#/components/schemas/HealthFieldDefinition'
      required:
      - fields
      - today
      - yesterday
    HealthDaySection:
      type: object
      description: 'Uma seção do ritual (``yesterday``/``today``): a data + os valores
        do dia.'
      properties:
        date:
          type: string
          format: date
        values:
          type: object
          additionalProperties:
            anyOf:
            - type: number
            - type: boolean
            - type: string
      required:
      - date
      - values
    HealthFieldCreate:
      type: object
      description: Entrada de criação (AC1, AC3). Valida a regra enum⇔opções (→ 400).
      properties:
        name:
          type: string
          maxLength: 200
        fieldType:
          $ref: '#/components/schemas/HealthFieldTypeEnum'
        enumOptions:
          type: array
          items:
            type: string
            maxLength: 200
        displayOrder:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - fieldType
      - name
    HealthFieldDefinition:
      type: object
      description: 'Saída: a definição de campo. ``field_type`` emite ``HealthFieldTypeEnum``.'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        fieldType:
          $ref: '#/components/schemas/HealthFieldTypeEnum'
        enumOptions:
          type: array
          items:
            type: string
          readOnly: true
        active:
          type: boolean
        displayOrder:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - enumOptions
      - fieldType
      - id
      - name
    HealthFieldTypeEnum:
      enum:
      - integer
      - decimal
      - boolean
      - enum
      - text
      type: string
      description: |-
        * `integer` - Integer
        * `decimal` - Decimal
        * `boolean` - Boolean
        * `enum` - Enum
        * `text` - Text
    HealthLog:
      type: object
      description: 'Saída de uma linha upsertada (resposta do ``PUT``): ``{id, date,
        values}``.'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        date:
          type: string
          format: date
        values:
          type: object
          additionalProperties:
            anyOf:
            - type: number
            - type: boolean
            - type: string
      required:
      - date
      - id
      - values
    HealthLogWrite:
      type: object
      description: |-
        Entrada do ``PUT`` (AC1): ``{date, values}``. Só valida **forma**.

        O conteúdo de ``values`` (tipo por campo, UUID ativo, atomicidade) é validado na
        camada de serviço (``upsert_health_log``) contra as definições do tenant (§6.4).
      properties:
        date:
          type: string
          format: date
        values:
          type: object
          additionalProperties:
            anyOf:
            - type: number
            - type: boolean
            - type: string
      required:
      - date
      - values
    HolidayResult:
      type: object
      description: 'Resultado do toggle de feriado: a data + o tipo de dia re-resolvido.'
      properties:
        date:
          type: string
          format: date
        dayType:
          $ref: '#/components/schemas/DayTypeEnum'
      required:
      - date
      - dayType
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - logDate
      - tasks
    MigrationQueue:
      type: object
      properties:
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - logDate
      - tasks
    MonthlyLog:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        closed:
          type: boolean
      required:
      - closed
      - monthFirst
      - tasks
    MonthlyReviewQueue:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - monthFirst
      - tasks
    MonthlyTaskCreate:
      type: object
      properties:
