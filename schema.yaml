openapi: 3.0.3
info:
  title: hmmb-bujo API
  version: 0.1.0
  description: BuJo Digital — API backend (Django REST Framework)
paths:
  /api/accounts/signup/:
    post:
      operationId: accounts_signup_create
      tags:
      - accounts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/token/:
    post:
      operationId: accounts_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/accounts/token/refresh/:
    post:
      operationId: accounts_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/bujo/catch-up/queue/:
    get:
      operationId: bujo_catch_up_queue_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatchUpQueue'
          description: ''
  /api/bujo/future-log/:
    get:
      operationId: bujo_future_log_list
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FutureLogMonthGroup'
          description: ''
  /api/bujo/logs/monthly/:
    get:
      operationId: bujo_logs_monthly_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyLog'
          description: ''
    post:
      operationId: bujo_logs_monthly_create
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonthlyTaskCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/logs/today/:
    get:
      operationId: bujo_logs_today_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
          description: ''
  /api/bujo/logs/weekly/:
    get:
      operationId: bujo_logs_weekly_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyLog'
          description: ''
  /api/bujo/migration/queue/:
    get:
      operationId: bujo_migration_queue_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationQueue'
          description: ''
  /api/bujo/monthly-review/queue/:
    get:
      operationId: bujo_monthly_review_queue_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReviewQueue'
          description: ''
  /api/bujo/tasks/:
    post:
      operationId: bujo_tasks_create
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/:
    patch:
      operationId: bujo_tasks_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTaskUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/migrate/:
    post:
      operationId: bujo_tasks_migrate_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskMigrate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/reorder/:
    post:
      operationId: bujo_tasks_reorder_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReorder'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/subtasks/:
    post:
      operationId: bujo_tasks_subtasks_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/transition/:
    post:
      operationId: bujo_tasks_transition_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskTransitionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/weekly-review/queue/:
    get:
      operationId: bujo_weekly_review_queue_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReviewQueue'
          description: ''
components:
  schemas:
    BlankEnum:
      enum:
      - ''
    CatchUpQueue:
      type: object
      properties:
        monthlyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        weeklyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        dailyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - dailyTasks
      - monthlyTasks
      - weeklyTasks
    CategoryEnum:
      enum:
      - teal
      - purple
      - pink
      - yellow
      - green
      - blue
      type: string
      description: |-
        * `teal` - Teal
        * `purple` - Purple
        * `pink` - Pink
        * `yellow` - Yellow
        * `green` - Green
        * `blue` - Blue
    DestinationEnum:
      enum:
      - today
      - week
      - month
      - future
      - cancel
      type: string
      description: |-
        * `today` - today
        * `week` - week
        * `month` - month
        * `future` - future
        * `cancel` - cancel
    EisenhowerEnum:
      enum:
      - ui
      - u
      - i
      - none
      type: string
      description: |-
        * `ui` - Urgent Important
        * `u` - Urgent
        * `i` - Important
        * `none` - None
    FutureLogMonthGroup:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - month
      - tasks
      - year
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - logDate
      - tasks
    MigrationQueue:
      type: object
      properties:
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - logDate
      - tasks
    MonthlyLog:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - monthFirst
      - tasks
    MonthlyReviewQueue:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - monthFirst
      - tasks
    MonthlyTaskCreate:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        title:
          type: string
          maxLength: 500
        scheduledDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - monthFirst
      - title
    NullEnum:
      enum:
      - null
    PatchedTaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
        scheduledDate:
          type: string
          format: date
          nullable: true
    PositionEnum:
      enum:
      - before
      - after
      type: string
      description: |-
        * `before` - before
        * `after` - after
    StatusEnum:
      enum:
      - pending
      - started
      - completed
      - cancelled
      - migrated
      - postponed
      type: string
      description: |-
        * `pending` - Pending
        * `started` - Started
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `migrated` - Migrated
        * `postponed` - Postponed
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        scheduledDate:
          type: string
          format: date
          nullable: true
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - subtasks
      - title
    TaskCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - title
    TaskMigrate:
      type: object
      properties:
        destination:
          $ref: '#/components/schemas/DestinationEnum'
        monthFirst:
          type: string
          format: date
        scheduledDate:
          type: string
          format: date
          nullable: true
      required:
      - destination
    TaskReorder:
      type: object
      properties:
        targetTaskId:
          type: string
          format: uuid
        position:
          $ref: '#/components/schemas/PositionEnum'
      required:
      - position
      - targetTaskId
    TaskTransitionRequest:
      type: object
      properties:
        toStatus:
          $ref: '#/components/schemas/ToStatusEnum'
      required:
      - toStatus
    ToStatusEnum:
      enum:
      - pending
      - started
      - completed
      - cancelled
      - migrated
      - postponed
      type: string
      description: |-
        * `pending` - Pending
        * `started` - Started
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `migrated` - Migrated
        * `postponed` - Postponed
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    WeeklyDay:
      type: object
      properties:
        date:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - date
      - tasks
    WeeklyLog:
      type: object
      properties:
        weekStart:
          type: string
          format: date
        days:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyDay'
        unscheduled:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - days
      - unscheduled
      - weekStart
    WeeklyReviewQueue:
      type: object
      properties:
        weekStart:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - tasks
      - weekStart
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
