components:
  schemas:
    ArchiveEntry:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        weekStart:
          type: string
          format: date
          nullable: true
        monthFirst:
          type: string
          format: date
          nullable: true
      required:
      - type
    BlankEnum:
      enum:
      - ''
    BrainDumpCount:
      type: object
      properties:
        count:
          type: integer
      required:
      - count
    BrainDumpItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        targetLog:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TargetLogEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        createdAt:
          type: string
          format: date-time
          readOnly: true
      required:
      - createdAt
      - id
      - title
    BrainDumpItemCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        targetLog:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TargetLogEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - title
    BrainDumpItemProcess:
      type: object
      properties:
        destination:
          $ref: '#/components/schemas/BrainDumpItemProcessDestinationEnum'
        monthFirst:
          type: string
          format: date
        scheduledDate:
          type: string
          format: date
          nullable: true
      required:
      - destination
    BrainDumpItemProcessDestinationEnum:
      enum:
      - today
      - week
      - month
      - future
      type: string
      description: |-
        * `today` - today
        * `week` - week
        * `month` - month
        * `future` - future
    CatchUpQueue:
      type: object
      properties:
        monthlyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        weeklyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        dailyTasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - dailyTasks
      - monthlyTasks
      - weeklyTasks
    CategoryEnum:
      enum:
      - teal
      - purple
      - pink
      - yellow
      - green
      - blue
      type: string
      description: |-
        * `teal` - Teal
        * `purple` - Purple
        * `pink` - Pink
        * `yellow` - Yellow
        * `green` - Green
        * `blue` - Blue
    EisenhowerEnum:
      enum:
      - ui
      - u
      - i
      - none
      type: string
      description: |-
        * `ui` - Urgent Important
        * `u` - Urgent
        * `i` - Important
        * `none` - None
    FutureLogMonthGroup:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - month
      - tasks
      - year
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - logDate
      - tasks
    MigrationQueue:
      type: object
      properties:
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - logDate
      - tasks
    MonthlyLog:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        closed:
          type: boolean
      required:
      - closed
      - monthFirst
      - tasks
    MonthlyReviewQueue:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - monthFirst
      - tasks
    MonthlyTaskCreate:
      type: object
      properties:
        monthFirst:
          type: string
          format: date
        title:
          type: string
          maxLength: 500
        scheduledDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - monthFirst
      - title
    NullEnum:
      enum:
      - null
    PatchedRecurringTaskTemplateUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
        recurrenceGroup:
          $ref: '#/components/schemas/RecurrenceGroupEnum'
        recurrenceText:
          type: string
        active:
          type: boolean
    PatchedTaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
        scheduledDate:
          type: string
          format: date
          nullable: true
    PositionEnum:
      enum:
      - before
      - after
      type: string
      description: |-
        * `before` - before
        * `after` - after
    RecurrenceGroupEnum:
      enum:
      - weekly
      - monthly
      - annual
      type: string
      description: |-
        * `weekly` - Weekly
        * `monthly` - Monthly
        * `annual` - Annual
    RecurringTaskTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        recurrenceGroup:
          $ref: '#/components/schemas/RecurrenceGroupEnum'
        recurrenceText:
          type: string
        active:
          type: boolean
      required:
      - id
      - recurrenceGroup
      - recurrenceText
      - title
    RecurringTaskTemplateCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
        recurrenceGroup:
          $ref: '#/components/schemas/RecurrenceGroupEnum'
        recurrenceText:
          type: string
        active:
          type: boolean
          default: true
      required:
      - recurrenceGroup
      - recurrenceText
      - title
    RecurringTaskTemplatePlace:
      type: object
      properties:
        weekStart:
          type: string
          format: date
        monthFirst:
          type: string
          format: date
        scheduledDate:
          type: string
          format: date
          nullable: true
    StatusEnum:
      enum:
      - pending
      - started
      - completed
      - cancelled
      - migrated
      - postponed
      type: string
      description: |-
        * `pending` - Pending
        * `started` - Started
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `migrated` - Migrated
        * `postponed` - Postponed
    TargetLogEnum:
      enum:
      - today
      - week
      - month
      - future
      type: string
      description: |-
        * `today` - Today
        * `week` - Week
        * `month` - Month
        * `future` - Future
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        scheduledDate:
          type: string
          format: date
