openapi: 3.0.3
info:
  title: hmmb-bujo API
  version: 0.1.0
  description: BuJo Digital — API backend (Django REST Framework)
paths:
  /api/accounts/signup/:
    post:
      operationId: accounts_signup_create
      tags:
      - accounts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/token/:
    post:
      operationId: accounts_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/accounts/token/refresh/:
    post:
      operationId: accounts_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/bujo/logs/today/:
    get:
      operationId: bujo_logs_today_retrieve
      tags:
      - bujo
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
          description: ''
  /api/bujo/tasks/:
    post:
      operationId: bujo_tasks_create
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/:
    patch:
      operationId: bujo_tasks_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTaskUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/reorder/:
    post:
      operationId: bujo_tasks_reorder_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReorder'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/subtasks/:
    post:
      operationId: bujo_tasks_subtasks_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/bujo/tasks/{id}/transition/:
    post:
      operationId: bujo_tasks_transition_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bujo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskTransitionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
components:
  schemas:
    BlankEnum:
      enum:
      - ''
    CategoryEnum:
      enum:
      - teal
      - purple
      - pink
      - yellow
      - green
      - blue
      type: string
      description: |-
        * `teal` - Teal
        * `purple` - Purple
        * `pink` - Pink
        * `yellow` - Yellow
        * `green` - Green
        * `blue` - Blue
    EisenhowerEnum:
      enum:
      - ui
      - u
      - i
      - none
      type: string
      description: |-
        * `ui` - Urgent Important
        * `u` - Urgent
        * `i` - Important
        * `none` - None
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        logDate:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - logDate
      - tasks
    NullEnum:
      enum:
      - null
    PatchedTaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
    PositionEnum:
      enum:
      - before
      - after
      type: string
      description: |-
        * `before` - before
        * `after` - after
    StatusEnum:
      enum:
      - pending
      - started
      - completed
      - cancelled
      - migrated
      - postponed
      type: string
      description: |-
        * `pending` - Pending
        * `started` - Started
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `migrated` - Migrated
        * `postponed` - Postponed
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - id
      - subtasks
      - title
    TaskCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          nullable: true
        eisenhower:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EisenhowerEnum'
          - $ref: '#/components/schemas/NullEnum'
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - title
    TaskReorder:
      type: object
      properties:
        targetTaskId:
          type: string
          format: uuid
        position:
          $ref: '#/components/schemas/PositionEnum'
      required:
      - position
      - targetTaskId
    TaskTransitionRequest:
      type: object
      properties:
        toStatus:
          $ref: '#/components/schemas/ToStatusEnum'
      required:
      - toStatus
    ToStatusEnum:
      enum:
      - pending
      - started
      - completed
      - cancelled
      - migrated
      - postponed
      type: string
      description: |-
        * `pending` - Pending
        * `started` - Started
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `migrated` - Migrated
        * `postponed` - Postponed
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
