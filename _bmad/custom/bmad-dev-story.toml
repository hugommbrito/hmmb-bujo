# Team override for bmad-dev-story.
# Origem: itens de ação #1, #2, #3 (processo) e #4, #5 (qualidade) da
# retrospectiva do Epic 3 (_bmad-output/implementation-artifacts/epic-3-retro-2026-07-08.md, Seção 8).
# #4 e #5 são condicionais (auto-gated pela própria redação) — não disparam em
# stories que não tocam auth / que não são a migração de subárvore da 4.2.
# persistent_facts APPENDS aos fatos da base — não substitui.

[workflow]
persistent_facts = [
  "Antes de escrever a contagem de testes em Completion Notes ou de finalizar a story (Step 9), rode o comando real da suite de testes (pytest/vitest) e cole a contagem observada literalmente — nunca escreva um número de memória ou estimado. (Retro Epic 3: Story 3.1 regrediu nisso — Completion Notes dizia '119 passed', o real era 121, corrigido em code review como achado M1.)",
  "A checagem final de File List (Step 9) deve ser a ÚLTIMA coisa feita antes de marcar a story como 'review': rode git status --short e git diff --stat DEPOIS de qualquer etapa de verificação manual (E2E, scripts de debug, Playwright) e reconcilie o File List documentado contra essa saída real, não apenas contra o que foi lembrado durante a implementação. (Retro Epic 3: o mesmo padrão se repetiu nas Stories 3.3 e 3.4 — arquivos criados na verificação manual ficaram fora do File List.)",
  "Se um gap de especificação for encontrado durante a implementação (campo, contrato ou comportamento que o código precisa mas que architecture.md/prd.md não documentam), a atualização do documento-fonte correspondente entra no escopo de fechamento da story — não marque a story como pronta para review com um gap de documentação conhecido e não resolvido. (Retro Epic 3: o campo category só voltou para architecture.md/prd.md na retrospectiva do épico seguinte, não na story que o introduziu.)",
  "Se esta story tocar DEFAULT_AUTHENTICATION_CLASSES ou qualquer configuração de autenticação, rode `manage.py spectacular` e compare `security`/`securitySchemes` do schema.yaml gerado MANUALMENTE contra o commitado antes de fechar — o guardrail de CI só compara types.gen.ts, e a perda de `security` no schema OpenAPI não muda os tipos TS, então passa despercebida. (Retro Epic 3 #4: na Story 3.2 trocar a auth class derrubou `security` de todos os endpoints e só foi pego por checagem manual.)",
  "Ao implementar a migração de subárvore (Story 4.2, AD-08 item 11 — migrar um pai recria a subárvore de filhos ainda não-dispostos no destino), escreva o teste do cenário 'pai com filho concluído + filho pendente' como o PRIMEIRO teste, não como caso de borda adicionado depois — é o cenário-âncora citado na AD-08 e o mais fácil de errar (qual filho viaja para o destino, qual permanece na origem). (Retro Epic 3 #5.)",
  "A checagem final de File List deve nomear explicitamente qualquer artefato de TIPO NOVO tocado pela story (ex.: spec E2E permanente, novo management command, novo arquivo de teste destrutivo) — não apenas reafirmar 'revisei o File List'. Esta checagem genérica já existe e ainda assim vazou: Epic 4 (Stories 4.2/4.3/4.5, specs E2E permanentes) e de novo no Epic 11 (Story 11.1: test_purge_e2e_users.py; Story 11.4: future-log-annual.spec.ts) — a mesma classe de achado sobreviveu 2 épicos porque a ação #1 da retro do Epic 4 nunca virou este guardrail escrito, só ficou em prosa na retrospectiva. (Retro Epic 4 #1; Retro Epic 11.)",
  "Ao encontrar um gap de especificação, checar explicitamente as ACs de epics.md — não só architecture.md/prd.md — como parte do fechamento da story. A Story 4.6 verificou só os dois últimos e concluiu 'nenhum gap', mas o gap real estava em epics.md. (Retro Epic 4 #2.)",
  "Ao resolver uma ambiguidade de especificação (a story e o código existente divergem ou são omissos), favoreça o documento mais específico + o código já existente, documente o raciocínio inline nas Dev Notes/Completion Notes, e trate como risco de mudança de uma linha se o Product Owner discordar depois. Padrão usado com sucesso repetidas vezes nos Epics 4 e 11 (nunca revertido em review) — nomeado aqui como prática institucionalizada, não mais implícita. (Retro Epic 4 #3.)",
  "Ao colar a contagem real de testes de backend em Completion Notes, rode a suíte SEM restringir por caminho (nunca `pytest bujo/ core/` ou equivalente) — o projeto tem outros apps com testes (ex.: `accounts/`) fora de `bujo/`/`core/`, e uma suíte escopada por engano produz um número internamente consistente mas incompleto que a re-execução independente do reviewer reproduz identicamente, sem detectar o gap. (Retro Epic 11: Story 11.5 reportou e teve confirmado em review '330 passed' via `pytest bujo/ core/ -q`; a contagem real de testes coletados no repo nesse commit era 356 — 26 testes de `accounts/` fora do escopo do comando, em ambas as execuções.)",
  "Quando um Dialog/modal precisar diferenciar 'usuário cancelou/fechou' de 'ação teve sucesso', use props de callback SEPARADAS desde o primeiro rascunho (`onClose` só para fechar/cancelar; `onSuccess` só para quando a ação-alvo é concluída) — nunca reaproveite um único `onClose` para os dois eventos, mesmo que pareça equivalente no caminho feliz. (Retro Epic 11: Story 11.6 encadeou o `onClose` do `TaskDestinationDialog` direto no `onClose` do `TaskDetailPanel`; como o Dialog chama `onClose` tanto no cancelamento quanto — via `onSuccess` interno de cada mutation — no sucesso, cancelar o diálogo fechava também o painel inteiro. Achado HIGH corrigido em code review.)",
  "Qualquer `Typography` do MUI com `variant` CUSTOM (ex.: `body-sm`, ou qualquer variante que não seja uma das nativas `body1`/`body2`/`h1`...) usada como elemento de BLOCO (texto secundário abaixo de um título, linha própria) precisa de `component=\"div\"` (ou outro elemento de bloco) explícito — sem isso o MUI cai no fallback `<span>` (`display:inline`), e `noWrap`/`overflow`/`text-overflow` simplesmente não se aplicam a `inline`, then o texto não trunca e cola na mesma linha do elemento anterior. (Retro Epic 11, 2º lote: Story 11.9 introduziu 3 linhas de descrição truncada com `variant=\"body-sm\"` sem `component=\"div\"` — a convenção já existia em 3 componentes anteriores (`RecurringPlacementDialog`, `TaskDestinationDialog`, `MonthDensityCalendar`) mas nunca tinha virado guardrail escrito; achado HIGH corrigido em code review — AC1 não era entregue de fato apesar da suíte de testes verde.)",
  "Ao introduzir navegação (link/`useNavigate`) para uma rota que renderiza a MESMA instância de componente React que a rota de origem (ex.: rota canônica `/planner/week` e rota parametrizada `/archive/weekly/:weekStart` renderizando o mesmo `WeeklyPage`), resete explicitamente qualquer estado local de UI (`useState` de formulário, painel aberto, seleção) num `useEffect` chaveado no parâmetro de rota que muda — o React preserva a instância (mesma posição na árvore) e todo `useState` sobrevive silenciosamente à navegação sem esse reset. (Retro Epic 11, 2º lote: Story 11.11 introduziu os primeiros botões de navegação anterior/próximo ENTRE instâncias do mesmo componente — antes, a única rota parametrizada só era alcançada a partir de um componente diferente, `ArchivePage`, que remonta por definição. Achado MEDIUM corrigido em code review, com testes de regressão que reproduzem o vazamento de estado.)",
  "Ao alterar um componente COMPARTILHADO por múltiplas superfícies (ex.: `TaskDetailPanel`, `RecurringPlacementDialog`), verifique TODOS os specs de e2e que o exercitam indiretamente — não só os specs da(s) superfície(s) citada(s) explicitamente nas tasks da story — antes de fechar a File List. Uma mudança no componente compartilhado tipicamente força ajuste em specs de outras superfícies que o consomem, mesmo que a story nunca as tenha listado como alvo. (Retro Epic 11, 2º lote: Story 11.7 esqueceu `daily-tasks.spec.ts` da File List — o `TaskDetailPanel` é compartilhado por Daily/Semana/Mês, e a correção de 'salvar explícito' forçou ajuste no e2e do Daily também, não só nos specs de Semana/Mês listados nas tasks; Story 11.8 teve o mesmo padrão com `recurring-templates.spec.ts`, adicionado por um passo de QA automatizado posterior e nunca reconciliado pela própria story. Ambos achados MEDIUM, corrigidos em code review.)",
  "O guardrail de 'contagem real, nunca de memória' também vale para baselines HERDADOS de outro documento: (a) ao citar um baseline de testes numa seção 'Previous Story Intelligence'/Dev Notes, re-execute o comando real no momento da criação da story em vez de copiar o número de uma story/retro anterior — mesmo quando esse número também alegava vir de execução real; e (b) rode a suíte e cole a contagem DEPOIS de escrever o último teste da story, não antes — se um teste for adicionado depois da contagem (ex.: fix de review), a contagem fica defasada. (Retro Epic 11 #2, deferido para a próxima revisão de guardrails; Retro Epic 5: a review da Story 5.3 pegou 'X passed' desatualizado — a story dizia 604 unit / 11 e2e, o real era 609 / 12, porque um teste de regressão foi adicionado depois de a contagem ser escrita. Achado MEDIUM.)",
  "`autoFocus` num `TextField`/input dentro de um Modal com FocusTrap (MUI `Dialog`, `Drawer`, `SwipeableDrawer`) NÃO foca o campo no browser real — o FocusTrap rouba o foco durante a animação de entrada. O teste unitário em jsdom passa (falso verde: jsdom não dispara o FocusTrap/transição da mesma forma). Foque via `inputRef` no callback `onEntered` da transição (roda depois da animação, então vence o FocusTrap); mantenha `autoFocus` só como caminho de montagem imediata para o unit test. Um AC de 'campo já em foco' dentro de um modal SÓ é provável de verdade por E2E real, nunca por unit test isolado. (Retro Epic 5: Story 5.3 — 1º uso de `SwipeableDrawer` no codebase; o `autoFocus` sozinho deixava o título `inactive` por 10s no Playwright apesar da suíte unitária verde.)",
  "A reconciliação de File List (Step 9) deve rodar TAMBÉM ao fim de qualquer passo pós-dev-story que altere arquivos — em especial `bmad-qa-generate-e2e-tests`: quando o passo de QA adicionar/alterar specs ou qualquer arquivo, reconcilie o File List E revise a afirmação 'sem E2E novo'/'nenhum arquivo novo' do dev-story contra `git status --short` ANTES da review, não só ao fim do dev-story. O guardrail existente cobre o fim do dev-story mas NÃO o handoff dev-story→QA, que roda depois e mexe no mesmo File List. (Retro Epic 12, Seção 3: recorreu em 12.1 — migration-flow.spec.ts — e 12.5 — external-capture.spec.ts + seedAutomationToken.ts + 14º teste — ambos MEDIUM em review; mesma classe das retros dos Epics 3/4/11.)",
  "A regra de 'contagem real, nunca de memória' vale também para a DIVISÃO da contagem (herdados vs. novos), não só para o total: nunca escreva 'X herdados + Y novos' de memória ou por subtração — derive Y contando os testes efetivamente adicionados pela story (`git diff`) e X da baseline re-executada. Um total correto pode esconder uma divisão errada. (Retro Epic 12, Seção 3: Story 12.5 reportou '26 herdados + 14 novos'; o real era 24 + 16 — o total 40/41 estava certo, a divisão não; mesma classe do Item #2 da Retro Epic 11, que ficou em prosa e recorreu.)",
]
