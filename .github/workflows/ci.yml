name: CI

on:
  push:
    branches: [main]
  pull_request:

# Scope of this workflow (Story 1.1): ruff + pytest (backend) and
# tsc + ESLint + vite build (frontend). It is intentionally structured so later
# stories can extend it — import-linter + tenant guardrail (1.2) and the
# types.gen.ts generation/diff (1.4) — without restructuring.

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Env vars live here, not in .env.example (GitHub Actions does not read .env
    # files). DATABASE_URL points at the ephemeral Postgres service below and has
    # NO sslmode (the service does not speak SSL — settings must not hardcode SSL).
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-dummy-secret-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hmmb_ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hmmb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      # Port rule (§7.2): fails the build if core/ imports a domain app. The
      # scoped-manager guardrail runs inside pytest (core/tests/test_guardrails.py),
      # so it needs no separate step.
      - name: Import boundaries (import-linter)
        run: uv run lint-imports

      - name: Pytest
        run: uv run pytest

      - name: Set up Node (para geração de types.gen.ts)
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Gerar schema OpenAPI
        run: uv run python manage.py spectacular --file ../schema.yaml

      - name: Verificar types.gen.ts está atualizado
        shell: bash
        run: |
          npx --yes openapi-typescript@^7 schema.yaml -o /tmp/types.gen.ts
          diff frontend/src/api/types.gen.ts /tmp/types.gen.ts \
            || (echo "❌ frontend/src/api/types.gen.ts divergiu do schema — rode 'npm run generate-types' em frontend/ e commite" && exit 1)
        working-directory: ${{ github.workspace }}

  frontend:
    name: Frontend (tsc + eslint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (vite)
        run: npm run build
