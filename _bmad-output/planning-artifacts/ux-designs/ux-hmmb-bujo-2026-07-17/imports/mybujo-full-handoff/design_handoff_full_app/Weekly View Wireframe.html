<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuJo Digital — Weekly View Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }

  :root{
    --paper:#eceae4; --box:#ffffff;
    --ink:#2c2a26; --ink-soft:#6f6c64; --ink-faint:#a6a299;
    --line:#9b978d; --line-soft:#cbc8c0;
    --fill:#dedbd3; --fill-2:#e8e6df;
    --red:#d6453c; --orange:#e07b1a; --yellow:#dca200; --green:#3aa861;
    --purple:#8b5cf6;         /* migration-ritual accent only */
    --pin:#2f5fa6; --pin-bg:#eaf0fa;
    --sketch:'Architects Daughter', cursive;
    --ui:'Sora', system-ui, sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(155,151,141,.07) 27px, rgba(155,151,141,.07) 28px),
      var(--paper);
    color:var(--ink); font-family:var(--ui); -webkit-font-smoothing:antialiased;
  }

  /* ===== toolbar ===== */
  .toolbar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:18px; padding:11px 26px;
    background:rgba(236,234,228,.92); backdrop-filter:blur(6px); border-bottom:1.5px solid var(--line); }
  .toolbar .brand{ display:flex; align-items:baseline; gap:10px; }
  .toolbar .brand b{ font-weight:700; font-size:15px; letter-spacing:.02em; }
  .toolbar .brand span{ font-family:var(--sketch); color:var(--ink-soft); font-size:15px; }
  .toolbar .spacer{ flex:1; }
  .tabs{ display:flex; gap:6px; background:#dedbd3; padding:4px; border-radius:9px; border:1.5px solid var(--line-soft); }
  .tab{ font-family:var(--sketch); font-size:15px; color:var(--ink-soft); padding:5px 14px; border-radius:6px; cursor:pointer; border:none; background:transparent; white-space:nowrap; }
  .tab.active{ background:var(--box); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .tab .mo{ color:var(--purple); }
  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-family:var(--sketch); font-size:15px; color:var(--ink); }
  .toggle .sw{ width:38px; height:21px; border-radius:11px; background:var(--line); position:relative; transition:.18s; border:1.5px solid var(--line); }
  .toggle .sw::after{ content:''; position:absolute; top:1.5px; left:1.5px; width:15px; height:15px; border-radius:50%; background:var(--box); transition:.18s; }
  .toggle.on .sw{ background:var(--pin); }
  .toggle.on .sw::after{ left:19px; }

  /* ===== app frame ===== */
  .stage{ padding:30px 26px 70px; display:flex; justify-content:center; }
  .app{ width:1440px; max-width:100%; display:grid; grid-template-columns:78px 1fr; position:relative;
    background:var(--paper); border:2.25px solid var(--ink); border-radius:16px; box-shadow:7px 9px 0 rgba(44,42,38,.13); overflow:hidden; }

  .rail{ background:var(--fill-2); border-right:2px solid var(--ink); display:flex; flex-direction:column; align-items:center; gap:6px; padding:16px 8px; }
  .rail .logo{ width:42px; height:42px; border:2px solid var(--ink); border-radius:11px; display:grid; place-items:center; font-weight:700; font-size:18px; margin-bottom:12px; background:var(--box); }
  .navitem{ width:54px; padding:9px 4px 7px; border-radius:10px; border:1.5px solid transparent; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; text-decoration:none; }
  .navitem .ic{ width:24px; height:24px; border:1.75px solid var(--ink-soft); border-radius:6px; display:grid; place-items:center; }
  .navitem .ic svg{ width:15px; height:15px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .navitem small{ font-size:9.5px; color:var(--ink-soft); letter-spacing:.01em; font-weight:500; }
  .navitem.active{ background:var(--box); border-color:var(--ink); }
  .navitem.active .ic{ border-color:var(--ink); background:var(--ink); }
  .navitem.active .ic svg{ stroke:var(--box); }
  .navitem.active small{ color:var(--ink); font-weight:600; }

  .main{ padding:18px 20px 24px; min-width:0; position:relative; }

  /* ===== region wrapper ===== */
  .region{ position:relative; background:var(--box); border:2px solid var(--ink); border-radius:var(--r); }
  .rtag{ position:absolute; top:-11px; left:14px; z-index:3; font-family:var(--sketch); font-size:12.5px; line-height:1; letter-spacing:.04em; background:var(--paper); color:var(--ink-soft); padding:1px 8px; text-transform:uppercase; }
  .pin{ position:absolute; top:-13px; right:-13px; z-index:6; width:27px; height:27px; border-radius:50%; background:var(--pin); color:#fff; border:2px solid var(--box); display:none; place-items:center; font-family:var(--sketch); font-size:14px; box-shadow:0 2px 5px rgba(47,95,166,.4); }
  body.annotated .pin{ display:grid; }

  .lbl-up{ font-family:var(--sketch); font-size:13px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .ghost{ border:1.75px solid var(--line); background:var(--box); border-radius:8px; padding:7px 12px; font-family:var(--ui); font-size:13px; color:var(--ink); cursor:pointer; font-weight:500; display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
  .ghost.icon{ padding:7px 9px; }
  .ghost svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .ghost.cta{ background:var(--ink); color:var(--box); border-color:var(--ink); }
  .ghost.cta svg{ stroke:var(--box); }

  /* ===== layout: main + sidebar ===== */
  .wrap{ display:grid; grid-template-columns:1fr 286px; gap:16px; align-items:start; }

  /* ===== week header ===== */
  .whead{ display:flex; align-items:center; gap:18px; padding:15px 18px; margin-bottom:14px; }
  .whead .wk{ font-size:13px; font-family:var(--sketch); color:var(--ink-soft); letter-spacing:.04em; }
  .whead .range{ font-size:25px; font-weight:700; letter-spacing:-.01em; }
  .whead .now-chip{ font-family:var(--sketch); font-size:12.5px; color:var(--green); border:1.5px solid var(--green); border-radius:20px; padding:2px 10px; }
  .whead .spacer{ flex:1; }
  /* week position indicators */
  .wkidx{ position:relative; display:flex; gap:9px; margin-left:4px; }
  .widx{ border:1.75px solid var(--line); border-radius:9px; padding:6px 12px 7px; background:var(--fill-2); text-align:center; min-width:84px; }
  .widx .wl{ display:block; font-family:var(--sketch); font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .widx .wv{ display:flex; align-items:baseline; justify-content:center; gap:4px; margin-top:2px; }
  .widx .wv b{ font-size:21px; font-weight:700; line-height:1; }
  .widx .wv i{ font-style:normal; font-size:11px; color:var(--ink-soft); }
  .widx .wc{ display:block; font-size:10px; color:var(--ink-soft); margin-top:1px; }
  .qstats{ display:flex; gap:10px; }
  .stat{ border:1.75px solid var(--line); border-radius:9px; padding:7px 13px; text-align:center; background:var(--fill-2); }
  .stat b{ display:block; font-size:19px; font-weight:700; line-height:1; }
  .stat small{ font-size:10.5px; color:var(--ink-soft); }
  .daynav{ display:flex; align-items:center; gap:6px; }

  /* ===== monday banner ===== */
  .mon-banner{ display:flex; align-items:center; gap:13px; padding:12px 16px; margin-bottom:14px; border:2px solid var(--purple); border-radius:11px; background:#f6f1fe; }
  .mon-banner .mbadge{ font-family:var(--sketch); font-size:12.5px; color:#fff; background:var(--purple); border-radius:7px; padding:3px 10px; white-space:nowrap; }
  .mon-banner .mtx{ font-size:13.5px; color:#4a3a78; }
  .mon-banner .mtx b{ color:#33285c; }
  .mon-banner .mgo{ margin-left:auto; }
  .mon-banner .mgo .ghost.cta{ background:var(--purple); border-color:var(--purple); }

  /* ===== week grid ===== */
  .grid-region{ padding:16px 14px 14px; }
  .grid-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:0 2px; }
  .grid-head .ttl{ font-weight:600; font-size:15px; }
  .grid-head .meta{ font-size:12px; color:var(--ink-soft); }
  .wgrid{ display:grid; grid-template-columns:repeat(5,1fr) .78fr .78fr; gap:9px; }
  .col{ border:1.75px solid var(--line-soft); border-radius:9px; background:var(--fill-2); display:flex; flex-direction:column; min-height:300px; }
  .col.today{ border:2.25px solid var(--ink); background:var(--box); box-shadow:0 0 0 3px rgba(44,42,38,.06); }
  .col-h{ padding:8px 9px 7px; border-bottom:1.5px solid var(--line-soft); display:flex; align-items:baseline; justify-content:space-between; }
  .col-h .dow{ font-weight:700; font-size:13px; }
  .col-h .dt{ font-size:11px; color:var(--ink-soft); }
  .col.today .col-h{ background:var(--ink); border-radius:6px 6px 0 0; margin:-0px; }
  .col.today .col-h .dow, .col.today .col-h .dt{ color:var(--box); }
  .col.today .col-h .dt{ opacity:.8; }
  .col.wknd{ background:#e6e4dd; }

  .dscore{ display:flex; gap:4px; padding:7px 8px; border-bottom:1.5px solid var(--line-soft); }
  .sc{ flex:1; border:1.5px solid var(--line); border-radius:5px; text-align:center; padding:3px 0 2px; background:var(--box); }
  .sc .sn{ font-weight:700; font-size:13px; line-height:1; }
  .sc.na .sn{ color:var(--ink-faint); font-weight:400; font-size:10px; font-family:var(--sketch); }
  .sc.empty{ border-style:dashed; }
  .sc .sl{ font-size:8px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }

  .ctasks{ padding:7px 7px 4px; display:flex; flex-direction:column; gap:5px; flex:1; }
  .ct{ display:grid; grid-template-columns:9px 1fr 14px; gap:6px; align-items:start; }
  .ct .cd{ width:9px; height:9px; border-radius:50%; margin-top:3px; }
  .cd.red{ background:var(--red); } .cd.orange{ background:var(--orange); }
  .cd.yellow{ background:var(--yellow); } .cd.green{ background:var(--green); }
  .ct .cttl{ font-size:11px; line-height:1.25; color:var(--ink); }
  .ct .crec{ display:inline-block; vertical-align:middle; margin-left:3px; }
  .ct .crec svg{ width:9px; height:9px; stroke:var(--ink-faint); fill:none; stroke-width:2; }
  .ct .cs{ justify-self:end; margin-top:1px; }
  .cbox{ width:13px; height:13px; border:1.6px solid var(--ink); border-radius:4px; display:block; }
  .cbox.done{ background:var(--ink); }
  .cbox.doing{ background:linear-gradient(135deg,var(--ink) 0 50%, transparent 50%); }
  .cmig{ font-family:var(--sketch); font-size:13px; color:var(--ink-soft); line-height:1; }
  .ct.done .cttl{ color:var(--ink-faint); text-decoration:line-through; }
  .ct.doing .cttl{ font-weight:600; }
  .cadd{ margin:4px 7px 8px; border:1.5px dashed var(--line); border-radius:7px; text-align:center; padding:5px; font-family:var(--sketch); font-size:11px; color:var(--ink-soft); cursor:pointer; }

  /* ===== sidebar ===== */
  .side{ display:grid; gap:14px; align-items:start; }
  .card{ position:relative; background:var(--box); border:2px solid var(--ink); border-radius:var(--r); padding:14px 14px 13px; }
  .card h4{ margin:0 0 10px; font-size:13.5px; font-weight:600; display:flex; align-items:center; justify-content:space-between; }
  .card h4 .fr{ font-family:var(--sketch); font-size:11px; color:var(--ink-faint); font-weight:400; }
  .wscore{ display:flex; align-items:center; gap:14px; }
  .wscore .big{ font-family:var(--sketch); font-size:38px; line-height:.9; }
  .wscore .wsmeta{ font-size:11px; color:var(--ink-soft); line-height:1.5; }
  .barline{ height:7px; border-radius:4px; background:var(--fill); margin-top:9px; overflow:hidden; }
  .barline i{ display:block; height:100%; background:var(--ink); border-radius:4px; }
  .goal{ display:flex; gap:8px; padding:7px 0; border-bottom:1.5px solid var(--line-soft); font-size:12px; color:var(--ink); }
  .goal:last-of-type{ border-bottom:none; }
  .goal .gb{ width:6px; height:6px; border:1.5px solid var(--ink-soft); border-radius:2px; margin-top:4px; flex:none; }
  .goal-add{ margin-top:9px; border:1.5px dashed var(--line); border-radius:8px; padding:8px; font-family:var(--sketch); font-size:12px; color:var(--ink-soft); text-align:center; cursor:pointer; }
  .recur-row{ display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1.5px solid var(--line-soft); font-size:11.5px; }
  .recur-row:last-of-type{ border-bottom:none; }
  .recur-row .ri{ width:18px; height:18px; border:1.5px solid var(--line); border-radius:5px; display:grid; place-items:center; flex:none; }
  .recur-row .ri svg{ width:11px; height:11px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .recur-row .rn{ flex:1; color:var(--ink); }
  .recur-row .rx{ font-family:var(--sketch); font-size:11px; color:var(--ink-soft); }
  .link{ font-family:var(--sketch); font-size:13px; color:var(--pin); cursor:pointer; display:inline-flex; align-items:center; gap:5px; margin-top:11px; }
  .link svg{ width:12px; height:12px; stroke:var(--pin); fill:none; stroke-width:2; }
  .navlist{ display:flex; flex-direction:column; gap:7px; }
  .navlink{ display:flex; align-items:center; gap:9px; padding:9px 10px; border:1.5px solid var(--line-soft); border-radius:8px; font-size:12.5px; color:var(--ink); cursor:pointer; text-decoration:none; }
  .navlink .ni{ width:20px; height:20px; border:1.5px solid var(--ink-soft); border-radius:5px; display:grid; place-items:center; flex:none; }
  .navlink .ni svg{ width:12px; height:12px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .navlink .na{ margin-left:auto; color:var(--ink-faint); }

  /* ===== migration overlay ===== */
  .mig-overlay{ position:absolute; inset:0; z-index:30; display:none; }
  body.ritual .mig-overlay{ display:flex; }
  .mig-overlay .scrim{ position:absolute; inset:0; background:rgba(44,42,38,.34); backdrop-filter:blur(1.5px); }
  .mig-panel{ position:relative; margin:auto; width:760px; max-width:94%; max-height:calc(100% - 36px); margin-top:24px;
    background:var(--box); border:2.5px solid var(--purple); border-radius:14px; box-shadow:0 22px 50px rgba(44,42,38,.32); display:flex; flex-direction:column; overflow:hidden; }
  .mig-top{ background:#f6f1fe; border-bottom:2px solid var(--purple); padding:16px 20px; }
  .mig-top .mt-row{ display:flex; align-items:center; gap:12px; }
  .mig-top .mt-badge{ font-family:var(--sketch); font-size:13px; color:#fff; background:var(--purple); border-radius:7px; padding:3px 11px; }
  .mig-top h3{ margin:0; font-size:19px; font-weight:700; color:#33285c; }
  .mig-top .mt-sub{ margin:7px 0 0; font-size:12.5px; color:#5b4a86; }
  .mig-prog{ display:flex; align-items:center; gap:11px; margin-top:12px; }
  .mig-prog .pbar{ flex:1; height:9px; border-radius:5px; background:#e3d8f7; overflow:hidden; }
  .mig-prog .pbar i{ display:block; height:100%; width:41.6%; background:var(--purple); border-radius:5px; }
  .mig-prog .pnum{ font-size:12px; color:#4a3a78; font-weight:600; white-space:nowrap; }
  .mig-list{ padding:8px 14px 12px; overflow:auto; }
  .mig-item{ display:flex; align-items:center; gap:11px; padding:11px 8px; border-bottom:1.5px solid var(--line-soft); }
  .mig-item:last-child{ border-bottom:none; }
  .mig-item .md{ width:12px; height:12px; border-radius:50%; flex:none; }
  .mig-item .mtxt{ flex:1; min-width:0; }
  .mig-item .mtt{ font-size:13px; color:var(--ink); }
  .mig-item .mfrom{ font-size:10.5px; color:var(--ink-faint); font-family:var(--sketch); margin-top:1px; }
  .mig-actions{ display:flex; gap:6px; flex:none; }
  .mbtn{ font-size:11.5px; font-family:var(--ui); border:1.6px solid var(--line); background:var(--box); border-radius:7px; padding:5px 9px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; color:var(--ink); }
  .mbtn svg{ width:12px; height:12px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .mbtn.mig:hover{ border-color:var(--green); } .mbtn.sch:hover{ border-color:var(--pin); } .mbtn.can:hover{ border-color:var(--red); }
  .mig-item.decided{ opacity:.62; }
  .mig-item.decided .mtt{ text-decoration:line-through; text-decoration-color:var(--line); }
  .decision{ font-family:var(--sketch); font-size:12px; border-radius:7px; padding:4px 11px; white-space:nowrap; }
  .decision.mig{ color:var(--green); border:1.5px solid var(--green); background:#eef8f1; }
  .decision.sch{ color:var(--pin); border:1.5px solid var(--pin); background:var(--pin-bg); }
  .decision.can{ color:var(--red); border:1.5px solid var(--red); background:#fbeeed; }
  .mig-foot{ border-top:1.5px solid var(--line-soft); padding:11px 18px; display:flex; align-items:center; gap:12px; background:var(--fill-2); }
  .mig-foot .lock{ font-family:var(--sketch); font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:7px; }
  .mig-foot .lock svg{ width:14px; height:14px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .mig-foot .spacer{ flex:1; }

  /* ===== legend ===== */
  .legend{ position:fixed; right:18px; bottom:18px; z-index:60; width:340px; background:var(--box); border:2px solid var(--pin); border-radius:13px; box-shadow:0 14px 36px rgba(44,42,38,.24); overflow:hidden; display:none; }
  body.annotated .legend{ display:block; }
  .legend-h{ background:var(--pin); color:#fff; padding:9px 14px; font-family:var(--sketch); font-size:15px; display:flex; align-items:center; justify-content:space-between; }
  .legend-h .x{ cursor:pointer; opacity:.85; font-size:18px; line-height:1; }
  .legend-b{ padding:10px 14px 13px; max-height:46vh; overflow:auto; }
  .lg{ display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-soft); }
  .lg:last-child{ border-bottom:none; }
  .lg .n{ flex:none; width:21px; height:21px; border-radius:50%; background:var(--pin-bg); color:var(--pin); border:1.5px solid var(--pin); display:grid; place-items:center; font-family:var(--sketch); font-size:12px; }
  .lg .t{ font-size:12px; color:var(--ink); line-height:1.4; }
  .lg .t b{ font-weight:600; }

  .keybar{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-top:13px; padding:11px 4px 2px; }
  .keybar .kt{ font-family:var(--sketch); font-size:13px; color:var(--ink-soft); }
  .keyitem{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink); }
  .keyitem .cd{ width:11px; height:11px; border-radius:50%; }
</style>
</head>
<body class="annotated">

  <div class="toolbar">
    <div class="brand"><b>BuJo Digital</b><span>· Weekly View — lo-fi wireframe</span></div>
    <div class="spacer"></div>
    <div class="toggle on" id="annoToggle"><span class="sw"></span>Annotations</div>
  </div>

  <div class="stage">
    <div class="app">
      <nav class="rail" id="rail"></nav>
      <div class="main" id="main"></div>
    </div>
  </div>

  <aside class="legend" id="legend">
    <div class="legend-h">Annotations — what &amp; why <span class="x" id="legendX">×</span></div>
    <div class="legend-b" id="legendBody"></div>
  </aside>

<script>
const ICON = {
  chevL:'<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
  chevR:'<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>',
  grid:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',

/* ---------- week-position rule ----------
   A week is Mon–Sun. It belongs to whichever cycle (month / year) its
   SUNDAY (last day) falls in — so a week that contains the 1st of the next
   cycle counts as week 1 of that next cycle, and a cycle's last week is its
   last WHOLE week. Numbering = the Sunday's ordinal within the cycle.        */
const WEEK_SUN = new Date(2026, 5, 14); // Sunday Jun 14, 2026 (end of shown week)
function weekOfMonth(sun){ return Math.ceil(sun.getDate() / 7); }
function weeksInMonth(y, m){ return Math.ceil(new Date(y, m+1, 0).getDate() / 7); }
function firstSundayOfYear(y){ const j = new Date(y,0,1); return new Date(y, 0, 1 + ((7 - j.getDay()) % 7)); }
function weekOfYear(sun){ const f = firstSundayOfYear(sun.getFullYear());
  return Math.round((sun - f) / (7*86400000)) + 1; }
function weeksInYear(y){ const f = firstSundayOfYear(y), end = new Date(y,11,31);
  return Math.floor((end - f) / (7*86400000)) + 1; }

function dayScore(d){
  return `<div class="dscore">${d.sc.map((v,i)=>{
    if(d.scNA[i]) return `<div class="sc na"><div class="sn">NA</div><div class="sl">${SCL[i]}</div></div>`;
    if(v===null) return `<div class="sc empty"><div class="sn" style="color:var(--ink-faint);font-weight:400">·</div><div class="sl">${SCL[i]}</div></div>`;
    return `<div class="sc"><div class="sn">${v}</div><div class="sl">${SCL[i]}</div></div>`;
  }).join('')}</div>`;
}
function stMark(st){
  if(st==='done')  return '<span class="cbox done"></span>';
  if(st==='doing') return '<span class="cbox doing"></span>';
  if(st==='mig')   return '<span class="cmig">→</span>';
  return '<span class="cbox"></span>';
}
function dayCol(d){

      <span class="cttl">${t.t}${t.rec?`<span class="crec">${ICON.repeat}</span>`:''}</span>
      <span class="cs">${stMark(t.st)}</span>
    </div>`).join('');
  return `<div class="col ${d.today?'today':''} ${d.wknd?'wknd':''}">
    <div class="col-h"><span class="dow">${d.dow}</span><span class="dt">${d.dt}</span></div>
    ${dayScore(d)}
    <div class="ctasks">${tasks}</div>
    <div class="cadd">+ add</div>
  </div>`;
}
