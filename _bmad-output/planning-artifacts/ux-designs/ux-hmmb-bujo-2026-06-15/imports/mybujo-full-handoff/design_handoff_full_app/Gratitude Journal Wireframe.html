<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuJo Digital — Gratitude Journal Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }

  :root{
    --paper:#eceae4; --box:#ffffff;
    --ink:#2c2a26; --ink-soft:#6f6c64; --ink-faint:#a6a299;
    --line:#9b978d; --line-soft:#cbc8c0;
    --fill:#dedbd3; --fill-2:#e8e6df;
    --pink:#e0559b; --purple:#8b5cf6;
    --red:#d6453c; --orange:#e07b1a; --yellow:#dca200; --green:#3aa861;
    --pin:#2f5fa6; --pin-bg:#eaf0fa;
    --sketch:'Architects Daughter', cursive;
    --ui:'Sora', system-ui, sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(155,151,141,.07) 27px, rgba(155,151,141,.07) 28px),
      var(--paper);
    color:var(--ink); font-family:var(--ui); -webkit-font-smoothing:antialiased;
  }

  /* ===== toolbar ===== */
  .toolbar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:18px; padding:11px 26px;
    background:rgba(236,234,228,.92); backdrop-filter:blur(6px); border-bottom:1.5px solid var(--line); }
  .toolbar .brand{ display:flex; align-items:baseline; gap:10px; }
  .toolbar .brand b{ font-weight:700; font-size:15px; letter-spacing:.02em; }
  .toolbar .brand span{ font-family:var(--sketch); color:var(--ink-soft); font-size:15px; }
  .toolbar .spacer{ flex:1; }
  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-family:var(--sketch); font-size:15px; color:var(--ink); }
  .toggle .sw{ width:38px; height:21px; border-radius:11px; background:var(--line); position:relative; transition:.18s; border:1.5px solid var(--line); }
  .toggle .sw::after{ content:''; position:absolute; top:1.5px; left:1.5px; width:15px; height:15px; border-radius:50%; background:var(--box); transition:.18s; }
  .toggle.on .sw{ background:var(--pin); }
  .toggle.on .sw::after{ left:19px; }

  /* ===== app frame ===== */
  .stage{ padding:30px 26px 70px; display:flex; justify-content:center; }
  .app{ width:1320px; max-width:100%; display:grid; grid-template-columns:78px 1fr; position:relative;
    background:var(--paper); border:2.25px solid var(--ink); border-radius:16px; box-shadow:7px 9px 0 rgba(44,42,38,.13); overflow:hidden; }

  .rail{ background:var(--fill-2); border-right:2px solid var(--ink); display:flex; flex-direction:column; align-items:center; gap:6px; padding:16px 8px; }
  .rail .logo{ width:42px; height:42px; border:2px solid var(--ink); border-radius:11px; display:grid; place-items:center; font-weight:700; font-size:18px; margin-bottom:12px; background:var(--box); }
  .navitem{ width:54px; padding:9px 4px 7px; border-radius:10px; border:1.5px solid transparent; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; text-decoration:none; }
  .navitem .ic{ width:24px; height:24px; border:1.75px solid var(--ink-soft); border-radius:6px; display:grid; place-items:center; }
  .navitem .ic svg{ width:15px; height:15px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .navitem small{ font-size:9.5px; color:var(--ink-soft); letter-spacing:.01em; font-weight:500; }
  .navitem.active{ background:var(--box); border-color:var(--ink); }
  .navitem.active .ic{ border-color:var(--ink); background:var(--ink); }
  .navitem.active .ic svg{ stroke:var(--box); }
  .navitem.active small{ color:var(--ink); font-weight:600; }

  .main{ padding:20px 22px 26px; min-width:0; position:relative; }

  /* ===== region wrapper ===== */
  .region{ position:relative; background:var(--box); border:2px solid var(--ink); border-radius:var(--r); }
  .rtag{ position:absolute; top:-11px; left:14px; z-index:3; font-family:var(--sketch); font-size:12.5px; line-height:1; letter-spacing:.04em; background:var(--paper); color:var(--ink-soft); padding:1px 8px; text-transform:uppercase; white-space:nowrap; }
  .pin{ position:absolute; top:-13px; right:-13px; z-index:6; width:27px; height:27px; border-radius:50%; background:var(--pin); color:#fff; border:2px solid var(--box); display:none; place-items:center; font-family:var(--sketch); font-size:14px; box-shadow:0 2px 5px rgba(47,95,166,.4); }
  body.annotated .pin{ display:grid; }
  .pin.lft{ right:auto; left:-13px; }

  .ghost{ border:1.75px solid var(--line); background:var(--box); border-radius:8px; padding:7px 12px; font-family:var(--ui); font-size:13px; color:var(--ink); cursor:pointer; font-weight:500; display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
  .ghost.icon{ padding:7px 9px; }
  .ghost svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .ghost.cta{ background:var(--ink); color:var(--box); border-color:var(--ink); }
  .ghost.cta svg{ stroke:var(--box); }

  /* ===== page header ===== */
  .phead{ display:flex; align-items:flex-end; gap:16px; margin-bottom:20px; }
  .phead .ttl h1{ margin:0; font-size:27px; font-weight:700; letter-spacing:-.01em; }
  .phead .ttl .sub{ font-family:var(--sketch); font-size:15px; color:var(--ink-soft); margin-top:3px; }
  .phead .sub em{ font-style:italic; color:var(--ink-faint); }
  .phead .spacer{ flex:1; }
  .count-pill{ display:inline-flex; align-items:center; gap:7px; font-family:var(--ui); font-size:13px; font-weight:600; color:var(--ink); border:1.75px solid var(--ink); background:var(--fill-2); border-radius:20px; padding:6px 13px; }
  .count-pill b{ font-size:15px; }
  .count-pill svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .datenav{ display:flex; align-items:center; gap:10px; background:var(--box); border:2px solid var(--ink); border-radius:10px; padding:5px 6px; }
  .datenav b{ width:30px; height:30px; border:1.5px solid var(--line); border-radius:7px; display:grid; place-items:center; cursor:pointer; background:var(--box); }
  .datenav b svg{ width:14px; height:14px; stroke:var(--ink); fill:none; stroke-width:2; }
  .datenav .lbl{ font-size:15px; font-weight:600; min-width:150px; text-align:center; display:flex; align-items:center; gap:8px; justify-content:center; cursor:pointer; }
  .datenav .lbl svg{ width:15px; height:15px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .datenav .lbl small{ font-family:var(--sketch); font-weight:400; font-size:11px; color:var(--ink-faint); }

  /* ===== section heads inside regions ===== */
  .sec-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .sec-head .icb{ width:26px; height:26px; border:1.75px solid var(--ink); border-radius:7px; display:grid; place-items:center; flex:none; background:var(--fill-2); }
  .sec-head .icb svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .sec-head .st{ font-size:16px; font-weight:600; }
  .sec-head .st small{ font-family:var(--sketch); font-weight:400; font-size:12px; color:var(--ink-faint); margin-left:6px; }
  .sec-head .spacer{ flex:1; }

  /* ===== main 2-col layout ===== */
  .layout{ display:grid; grid-template-columns:1.5fr 1fr; gap:22px; align-items:start; }
  .col{ display:flex; flex-direction:column; gap:20px; min-width:0; }

  /* ===== compose (primary) ===== */
  .compose{ padding:18px 20px 18px; }
  .compose .ta{ border:1.9px solid var(--line); background:var(--box); border-radius:10px; padding:16px 16px; min-height:118px;
    font-family:var(--ui); font-size:16px; color:var(--ink-faint); line-height:1.5; position:relative; }
  .compose .ta .cursor{ display:inline-block; width:1.5px; height:19px; background:var(--ink); vertical-align:-3px; margin-left:1px; animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{opacity:0;} }
  .compose .ta .hint-line{ position:absolute; left:16px; right:16px; bottom:14px; border-top:1.5px dashed var(--line-soft); }
  .compose .compose-foot{ display:flex; align-items:center; gap:12px; margin-top:13px; }
  .kbd-hint{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-faint); }
  .kbd{ font-family:var(--ui); font-size:11px; font-weight:600; color:var(--ink-soft); border:1.5px solid var(--line); border-bottom-width:2.5px; border-radius:5px; padding:2px 6px; background:var(--fill-2); }
  .compose-foot .spacer{ flex:1; }
  .addbtn{ padding:10px 18px; font-size:14px; }

  /* ===== today's entries list ===== */
  .today-list{ display:flex; flex-direction:column; }
  .gentry{ display:flex; gap:14px; padding:14px 2px; border-bottom:1.5px dashed var(--line-soft); position:relative; }
  .gentry:last-child{ border-bottom:none; padding-bottom:2px; }
  .gentry .tstamp{ flex:none; width:52px; padding-top:2px; font-family:var(--sketch); font-size:13px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px; }
  .gentry .tstamp .dot{ width:9px; height:9px; border-radius:50%; border:1.75px solid var(--ink); background:var(--box); }
  .gentry .gbody{ flex:1; min-width:0; }
  .gentry .gtext{ font-size:15px; line-height:1.55; color:var(--ink); }
  .gentry .gtools{ display:flex; gap:6px; opacity:0; transition:.15s; flex:none; }
  .gentry:hover .gtools{ opacity:1; }
  .gtool{ width:26px; height:26px; border:1.5px solid var(--line-soft); border-radius:7px; background:var(--box); display:grid; place-items:center; cursor:pointer; }
  .gtool svg{ width:13px; height:13px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .gtool:hover{ border-color:var(--ink); }
  .gtool:hover svg{ stroke:var(--ink); }

  /* ===== stats widget ===== */
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:0; }
  .stat{ padding:4px 14px; border-right:1.5px dashed var(--line-soft); }
  .stat:last-child{ border-right:none; }
  .stat .sk{ font-family:var(--sketch); font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; display:flex; align-items:center; gap:5px; }
  .stat .sk svg{ width:13px; height:13px; stroke:var(--orange); fill:none; stroke-width:1.9; }
  .stat .sk svg.flame{ fill:var(--orange); stroke:none; }
  .stat .sv{ font-size:26px; font-weight:700; line-height:1; margin-top:7px; letter-spacing:-.01em; }
  .stat .sv small{ font-size:13px; color:var(--ink-faint); font-weight:600; }

  /* ===== past entries browser ===== */
  .browser{ padding:16px 18px 14px; }
  .browse-scroll{ max-height:560px; overflow-y:auto; overflow-x:hidden; margin:0 -6px; padding:0 6px; display:flex; flex-direction:column; gap:14px; }
  .dayblock{ border:1.75px solid var(--line); border-radius:10px; background:var(--box); padding:13px 15px 14px; }
  .dayblock .dhead{ display:flex; align-items:center; gap:9px; margin-bottom:11px; }
  .dayblock .dhead .dd{ font-size:14px; font-weight:600; }
  .dayblock .dhead .dcount{ font-family:var(--sketch); font-size:12px; color:var(--ink-faint); }
  .dayblock .dhead .spacer{ flex:1; }
  .dayblock .dhead .open{ font-family:var(--sketch); font-size:12px; color:var(--pin); cursor:pointer; }
  .pastentry{ display:flex; gap:11px; padding:6px 0; }
  .pastentry .pt{ flex:none; width:42px; font-family:var(--sketch); font-size:12px; color:var(--ink-faint); padding-top:1px; }
  .pastentry .px{ flex:1; font-size:13.5px; line-height:1.5; color:var(--ink-soft); }
  .pastentry .px.trunc{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .more-row{ text-align:center; padding-top:4px; }
  .more-link{ font-family:var(--sketch); font-size:13px; color:var(--pin); cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .more-link svg{ width:14px; height:14px; stroke:var(--pin); fill:none; stroke-width:2; }
  .scroll-cap{ font-family:var(--sketch); font-size:11.5px; color:var(--ink-faint); text-align:center; padding:6px 0 2px; }

  /* mini calendar popover sketch */
  .calhint{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-faint); margin-top:10px; }
  .calhint svg{ width:14px; height:14px; stroke:var(--ink-faint); fill:none; stroke-width:1.8; }

  /* ===== legend ===== */
  .legend{ position:fixed; right:18px; bottom:18px; z-index:60; width:352px; background:var(--box); border:2px solid var(--pin); border-radius:13px; box-shadow:0 14px 36px rgba(44,42,38,.24); overflow:hidden; display:none; }
  body.annotated .legend{ display:block; }
  .legend-h{ background:var(--pin); color:#fff; padding:9px 14px; font-family:var(--sketch); font-size:15px; display:flex; align-items:center; justify-content:space-between; }
  .legend-h .x{ cursor:pointer; opacity:.85; font-size:18px; line-height:1; }
  .legend-b{ padding:10px 14px 13px; max-height:54vh; overflow:auto; }
  .lg{ display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-soft); }
  .lg:last-child{ border-bottom:none; }
  .lg .n{ flex:none; width:21px; height:21px; border-radius:50%; background:var(--pin-bg); color:var(--pin); border:1.5px solid var(--pin); display:grid; place-items:center; font-family:var(--sketch); font-size:12px; }
  .lg .t{ font-size:12px; color:var(--ink); line-height:1.42; }
  .lg .t b{ font-weight:600; }
</style>
</head>
<body class="annotated">

  <div class="toolbar">
    <div class="brand"><b>BuJo Digital</b><span>· Gratitude Journal — lo-fi wireframe</span></div>
    <div class="spacer"></div>
    <div class="toggle on" id="annoToggle"><span class="sw"></span>Annotations</div>
  </div>

  <div class="stage">
    <div class="app">
      <nav class="rail" id="rail"></nav>
      <div class="main" id="main"></div>
    </div>
  </div>

  <aside class="legend" id="legend">
    <div class="legend-h">Annotations — what &amp; why <span class="x" id="legendX">×</span></div>
    <div class="legend-b" id="legendBody"></div>
  </aside>

<script>
const ICON = {
  chevL:'<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
  chevR:'<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>',
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>',
  week:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="20"/></svg>',
  cal:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>',
  repeat:'<svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  health:'<svg viewBox="0 0 24 24"><path d="M3 12h4l2 5 4-12 2 7h6"/></svg>',
  habits:'<svg viewBox="0 0 24 24"><polyline points="3 6 4.5 7.5 7 5"/><polyline points="3 12 4.5 13.5 7 11"/><polyline points="3 18 4.5 19.5 7 17"/><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/></svg>',
  grat:'<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z"/></svg>',
  clock:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c1 3-1 4-2 6s0 4 0 4-2-1-2-3c-2 2-3 4-3 6a7 7 0 0 0 14 0c0-3-2-5-3-7-1.5 1-2 .5-2-1 0-2-1-4-2-5z"/></svg>',
  plus:'<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  pencil:'<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  trash:'<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',
  chevDown:'<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>',
  leaf:'<svg viewBox="0 0 24 24"><path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 16-9 0 9-4 13-9 13z"/><path d="M4 21c4-5 7-7 11-8"/></svg>',
};

/* nav rail — Gratitude active, slotted after Habits */
const NAV = [
  {ic:'sun', label:'Daily', href:'Daily Dashboard Wireframe.html'},
  {ic:'week', label:'Weekly', href:'Weekly View Wireframe.html'},
  {ic:'cal', label:'Monthly', href:'Monthly &amp; Future Log Wireframe.html'},
  {ic:'repeat', label:'Recurr.'},
  {ic:'habits', label:'Habits', href:'Habits Tracker Wireframe.html'},
  {ic:'grat', label:'Gratitude', active:true},
  {ic:'health', label:'Health', href:'Health Tracking Wireframe.html'},
];
document.getElementById('rail').innerHTML =
  '<div class="logo">B</div>' +
  NAV.map(n=>`<a class="navitem ${n.active?'active':''}" ${n.href?`href="${n.href}"`:''}>
      <span class="ic">${ICON[n.ic]}</span><small>${n.label}</small></a>`).join('');

/* ===================== DATA ===================== */
// Today = Mon, June 8 2026 (consistent with sibling screens)
const TODAY = [
  {t:'07:42', x:'Slow morning with coffee on the balcony before anyone else was awake — that quiet half hour set the whole day right.'},
  {t:'13:10', x:'A stranger held the door and actually waited. Small, but it landed.'},
  {t:'21:05', x:'Finally fixed the bug that\u2019s been haunting me all week. Relief more than triumph.'},
];

// Past days, reverse-chronological (most recent first)
const PAST = [
  {day:'Sunday, June 7', n:4, entries:[
    {t:'08:20', x:'Pancakes with the family — nobody rushed off anywhere.'},
    {t:'11:45', x:'A long walk by the river; the light through the trees was unreasonably good.'},
    {t:'17:30', x:'Got a kind note from an old colleague out of nowhere, which made my afternoon and reminded me to reach back out to people I\u2019ve drifted from.'},
    {t:'22:10', x:'Clean sheets. That\u2019s it. That\u2019s the gratitude.'},
  ]},
  {day:'Saturday, June 6', n:2, entries:[
    {t:'10:05', x:'Slept in without guilt for the first time in ages.'},
    {t:'19:50', x:'Cooked something new and it actually worked out.'},
  ]},
  {day:'Friday, June 5', n:3, entries:[
    {t:'09:14', x:'Made it through a hard conversation and we both felt lighter after.'},
    {t:'15:22', x:'Sunshine after a week of rain — sat outside for lunch.'},
    {t:'23:01', x:'Quiet evening, good book, no plans and no FOMO about it.'},
  ]},
  {day:'Thursday, June 4', n:1, entries:[
    {t:'20:40', x:'My back finally stopped aching after the new chair arrived.'},
  ]},
];

/* ===================== RENDER ===================== */
function todayEntries(){
  return TODAY.map(e=>`
    <div class="gentry">
      <div class="tstamp"><span class="dot"></span>${e.t}</div>
      <div class="gbody"><div class="gtext">${e.x}</div></div>
      <div class="gtools">
        <span class="gtool" title="Edit">${ICON.pencil}</span>
        <span class="gtool" title="Delete">${ICON.trash}</span>
      </div>
    </div>`).join('');
}

function pastBlocks(){
  return PAST.map((d,di)=>`
    <div class="dayblock">
      <div class="dhead">
        <span class="dd">${d.day}</span>
        <span class="dcount">· ${d.n} ${d.n===1?'entry':'entries'}</span>
        <span class="spacer"></span>
        <span class="open">open ${ICON_INLINE}</span>
      </div>
      ${d.entries.map((e,ei)=>`
        <div class="pastentry">
          <span class="pt">${e.t}</span>
          <span class="px ${(di>0&&ei===d.entries.length-1)?'trunc':''}">${e.x}</span>
        </div>`).join('')}
      ${di===0 ? '<div class="more-row"><span class="more-link">expand all 4 '+ICON.chevDown+'</span></div>' : ''}
    </div>`).join('');
}
const ICON_INLINE = '';

function buildMain(){
  const count = TODAY.length;
  return `
  <!-- header -->
  <div class="phead">
    <div class="ttl">
      <h1>Gratitude</h1>
      <div class="sub">A daily pause — <em>what went right today?</em></div>
    </div>
    <div class="spacer"></div>
    <span class="pin lft" style="position:relative;top:auto;left:auto;margin-right:2px">1</span>
    <span class="count-pill">${ICON.leaf}<b>${count}</b> entries today</span>
    <div class="datenav">
      <b>${ICON.chevL}</b>
      <span class="lbl">${ICON.cal}<span>Mon, Jun 8<small style="display:block">2026 · today</small></span></span>
      <b>${ICON.chevR}</b>
    </div>
  </div>

  <div class="layout">

    <!-- LEFT COLUMN -->
    <div class="col">

      <!-- COMPOSE (primary) -->
      <section class="region compose">
        <span class="rtag">New entry · primary action</span><span class="pin">2</span>
        <div class="ta">
          What are you grateful for today?<span class="cursor"></span>
          <div class="hint-line"></div>
        </div>
        <div class="compose-foot">
          <span class="kbd-hint"><span class="kbd">\u2318</span><span class="kbd">\u23CE</span> to add</span>
          <span class="spacer"></span>
          <button class="ghost cta addbtn">${ICON.plus} Add entry</button>
        </div>
      </section>

      <!-- TODAY'S ENTRIES -->
      <section class="region" style="padding:16px 18px 14px">
        <span class="rtag">Today's entries</span><span class="pin">3</span>
        <div class="sec-head">
          <span class="icb">${ICON.sun}</span>
          <span class="st">Today <small>${count} so far · newest at bottom</small></span>
        </div>
        <div class="today-list">${todayEntries()}</div>
      </section>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="col">

      <!-- STATS WIDGET -->
      <section class="region" style="padding:15px 6px 16px">
        <span class="rtag">Insights</span><span class="pin">4</span>
        <div class="stats-row">
          <div class="stat">
            <div class="sk"><span style="display:inline-flex;width:13px;height:13px">${ICON.flame.replace('<svg','<svg class=\"flame\"')}</span>Streak</div>
            <div class="sv">12<small> days</small></div>
          </div>
          <div class="stat">
            <div class="sk">Total</div>
            <div class="sv">214</div>
          </div>
          <div class="stat">
            <div class="sk">Avg / day</div>
            <div class="sv">2.6</div>
          </div>
        </div>
      </section>

      <!-- PAST ENTRIES BROWSER -->
      <section class="region browser">
        <span class="rtag">Look back</span><span class="pin">5</span>
        <div class="sec-head">
          <span class="icb">${ICON.cal}</span>
          <span class="st">Past entries <small>most recent first</small></span>
          <span class="spacer"></span>
          <div class="datenav" style="padding:3px 4px">
            <b>${ICON.chevL}</b>
            <span class="lbl" style="min-width:30px;font-size:13px">${ICON.cal}</span>
            <b>${ICON.chevR}</b>
          </div>
        </div>
        <span class="pin" style="top:120px;right:-13px">6</span>
        <div class="browse-scroll">
          ${pastBlocks()}
          <div class="scroll-cap">— scroll for older days · loads more —</div>
        </div>
      </section>

    </div>
  </div>`;
}
document.getElementById('main').innerHTML = buildMain();

/* ===================== legend ===================== */
const LEGEND = [
  ['Header + date stepper','Screen title with a calm, reflective framing. A live <b>entry count for today</b> sits beside the date. The stepper defaults to today (Mon Jun 8); the calendar label jumps to any specific past date.'],
  ['New entry — PRIMARY','The largest, most inviting element on the page: a roomy free-text box with a gentle prompt placeholder. <b>\u2318\u23CE</b> or the <b>Add entry</b> button commits it. This is the one thing the screen wants you to do.'],
  ['Today\u2019s entries','Entries the user adds throughout the day, listed in chronological order (newest at the bottom, nearest the input). Each row shows a <b>timestamp</b>, the text, and subtle hover-only <b>edit / delete</b> tools so the page stays quiet.'],
  ['Insights widget','A compact, optional row: current <b>streak</b> (consecutive days with \u22651 entry), <b>total</b> entries logged, and <b>average per day</b>. Glanceable, never the focus.'],
  ['Past entries browser','A scrollable, reverse-chronological list of past days. Each block is a <b>date header</b> + entry count + that day\u2019s entries. Long entries truncate with an expand option; the list pages in older days on scroll.'],
  ['Day block + expand','Today\u2019s most recent day can expand all entries; older blocks show entries truncated to one line to keep the column scannable. \u201cOpen\u201d jumps that whole day into the main editor.'],
];
document.getElementById('legendBody').innerHTML = LEGEND.map((l,i)=>`
  <div class="lg"><span class="n">${i+1}</span><span class="t"><b>${l[0]}.</b> ${l[1]}</span></div>`).join('');

/* ===================== controls ===================== */
const annoT = document.getElementById('annoToggle');
annoT.addEventListener('click', ()=>{
  annoT.classList.toggle('on');
  document.body.classList.toggle('annotated', annoT.classList.contains('on'));
});
document.getElementById('legendX').addEventListener('click', ()=>{
  annoT.classList.remove('on'); document.body.classList.remove('annotated');
});
</script>
</body>
</html>
