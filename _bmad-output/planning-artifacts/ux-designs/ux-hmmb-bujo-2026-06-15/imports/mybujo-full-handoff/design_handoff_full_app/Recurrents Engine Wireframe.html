<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuJo Digital — Recurrents Engine Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  @font-face { font-family:'Sora'; src:url('fonts/Sora-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }

  :root{
    --paper:#eceae4; --box:#ffffff;
    --ink:#2c2a26; --ink-soft:#6f6c64; --ink-faint:#a6a299;
    --line:#9b978d; --line-soft:#cbc8c0;
    --fill:#dedbd3; --fill-2:#e8e6df;
    --pink:#e0559b; --purple:#8b5cf6;
    --red:#d6453c; --orange:#e07b1a; --yellow:#dca200; --green:#3aa861;
    --pin:#2f5fa6; --pin-bg:#eaf0fa;
    --sketch:'Architects Daughter', cursive;
    --ui:'Sora', system-ui, sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(155,151,141,.07) 27px, rgba(155,151,141,.07) 28px),
      var(--paper);
    color:var(--ink); font-family:var(--ui); -webkit-font-smoothing:antialiased;
  }

  /* ===== toolbar ===== */
  .toolbar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:18px; padding:11px 26px;
    background:rgba(236,234,228,.92); backdrop-filter:blur(6px); border-bottom:1.5px solid var(--line); }
  .toolbar .brand{ display:flex; align-items:baseline; gap:10px; }
  .toolbar .brand b{ font-weight:700; font-size:15px; letter-spacing:.02em; }
  .toolbar .brand span{ font-family:var(--sketch); color:var(--ink-soft); font-size:15px; }
  .toolbar .spacer{ flex:1; }
  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-family:var(--sketch); font-size:15px; color:var(--ink); }
  .toggle .sw{ width:38px; height:21px; border-radius:11px; background:var(--line); position:relative; transition:.18s; border:1.5px solid var(--line); }
  .toggle .sw::after{ content:''; position:absolute; top:1.5px; left:1.5px; width:15px; height:15px; border-radius:50%; background:var(--box); transition:.18s; }
  .toggle.on .sw{ background:var(--pin); }
  .toggle.on .sw::after{ left:19px; }

  /* ===== app frame ===== */
  .stage{ padding:30px 26px 70px; display:flex; justify-content:center; }
  .app{ width:1320px; max-width:100%; display:grid; grid-template-columns:78px 1fr; position:relative;
    background:var(--paper); border:2.25px solid var(--ink); border-radius:16px; box-shadow:7px 9px 0 rgba(44,42,38,.13); overflow:hidden; }

  .rail{ background:var(--fill-2); border-right:2px solid var(--ink); display:flex; flex-direction:column; align-items:center; gap:6px; padding:16px 8px; }
  .rail .logo{ width:42px; height:42px; border:2px solid var(--ink); border-radius:11px; display:grid; place-items:center; font-weight:700; font-size:18px; margin-bottom:12px; background:var(--box); }
  .navitem{ width:54px; padding:9px 4px 7px; border-radius:10px; border:1.5px solid transparent; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; text-decoration:none; }
  .navitem .ic{ width:24px; height:24px; border:1.75px solid var(--ink-soft); border-radius:6px; display:grid; place-items:center; }
  .navitem .ic svg{ width:15px; height:15px; stroke:var(--ink-soft); fill:none; stroke-width:1.8; }
  .navitem small{ font-size:9.5px; color:var(--ink-soft); letter-spacing:.01em; font-weight:500; }
  .navitem.active{ background:var(--box); border-color:var(--ink); }
  .navitem.active .ic{ border-color:var(--ink); background:var(--ink); }
  .navitem.active .ic svg{ stroke:var(--box); }
  .navitem.active small{ color:var(--ink); font-weight:600; }

  .main{ padding:20px 22px 26px; min-width:0; position:relative; }

  /* ===== region wrapper ===== */
  .region{ position:relative; background:var(--box); border:2px solid var(--ink); border-radius:var(--r); }
  .rtag{ position:absolute; top:-11px; left:14px; z-index:3; font-family:var(--sketch); font-size:12.5px; line-height:1; letter-spacing:.04em; background:var(--paper); color:var(--ink-soft); padding:1px 8px; text-transform:uppercase; white-space:nowrap; }
  .pin{ position:absolute; top:-13px; right:-13px; z-index:6; width:27px; height:27px; border-radius:50%; background:var(--pin); color:#fff; border:2px solid var(--box); display:none; place-items:center; font-family:var(--sketch); font-size:14px; box-shadow:0 2px 5px rgba(47,95,166,.4); }
  body.annotated .pin{ display:grid; }
  .pin.lft{ right:auto; left:-13px; }

  .ghost{ border:1.75px solid var(--line); background:var(--box); border-radius:8px; padding:7px 12px; font-family:var(--ui); font-size:13px; color:var(--ink); cursor:pointer; font-weight:500; display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
  .ghost.icon{ padding:7px 9px; }
  .ghost svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .ghost.cta{ background:var(--ink); color:var(--box); border-color:var(--ink); }
  .ghost.cta svg{ stroke:var(--box); }
  .ghost.sm{ padding:5px 9px; font-size:12px; }

  /* ===== page header ===== */
  .phead{ display:flex; align-items:flex-end; gap:16px; margin-bottom:18px; }
  .phead .ttl h1{ margin:0; font-size:27px; font-weight:700; letter-spacing:-.01em; }
  .phead .ttl .sub{ font-family:var(--sketch); font-size:15px; color:var(--ink-soft); margin-top:3px; }
  .phead .sub em{ font-style:italic; color:var(--ink-faint); }
  .phead .spacer{ flex:1; }
  .synced{ display:inline-flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft); border:1.75px solid var(--line); background:var(--fill-2); border-radius:20px; padding:7px 13px; }
  .synced .pls{ width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(58,168,97,.18); }
  .synced b{ color:var(--ink); font-weight:600; }

  /* ===== tabs ===== */
  .tabs{ display:flex; gap:8px; margin-bottom:20px; border-bottom:2px solid var(--ink); }
  .tab{ position:relative; display:flex; align-items:center; gap:9px; padding:11px 20px; cursor:pointer; background:var(--fill-2);
    border:2px solid var(--ink); border-bottom:none; border-radius:10px 10px 0 0; margin-bottom:-2px; color:var(--ink-soft); font-weight:600; font-size:15px; }
  .tab .tc{ font-family:var(--sketch); font-weight:400; font-size:12px; color:var(--ink-faint); background:var(--box); border:1.5px solid var(--line-soft); border-radius:20px; padding:1px 8px; }
  .tab .tic{ width:17px; height:17px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .tab.active{ background:var(--box); color:var(--ink); }
  .tab.active::after{ content:''; position:absolute; left:0; right:0; bottom:-2px; height:3px; background:var(--box); }
  .tab.active .tic{ stroke:var(--ink); }
  .tab.active .tc{ color:var(--ink); border-color:var(--ink); }

  /* ===== two column layout ===== */
  .layout{ display:grid; grid-template-columns:1.85fr 1fr; gap:22px; align-items:start; }
  .col{ display:flex; flex-direction:column; gap:22px; min-width:0; }

  /* ===== generic section heads inside regions ===== */
  .sec-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .sec-head .icb{ width:26px; height:26px; border:1.75px solid var(--ink); border-radius:7px; display:grid; place-items:center; flex:none; background:var(--fill-2); }
  .sec-head .icb svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:1.9; }
  .sec-head .st{ font-size:16px; font-weight:600; }
  .sec-head .st small{ font-family:var(--sketch); font-weight:400; font-size:12px; color:var(--ink-faint); margin-left:6px; }
  .sec-head .spacer{ flex:1; }

  /* ===== list region ===== */
  .listwrap{ padding:16px 18px 16px; }
  .rec-list{ display:flex; flex-direction:column; gap:11px; }
  .rec{ display:flex; flex-wrap:wrap; align-items:center; gap:9px 14px; border:1.75px solid var(--line); border-radius:10px; padding:12px 14px; background:var(--box); }
  .rec:hover{ border-color:var(--ink); }
  .pdot{ width:14px; height:14px; border-radius:50%; flex:none; border:1.5px solid rgba(0,0,0,.18); }
  .p-pink{ background:var(--pink); } .p-purple{ background:var(--purple); }
  .p-yellow{ background:var(--yellow); } .p-green{ background:var(--green); }
  .rec .rmain{ flex:1 1 230px; min-width:0; }
  .rec .rtitle{ font-size:14.5px; font-weight:600; letter-spacing:-.005em; }
  .rec .rmeta{ font-size:11.5px; color:var(--ink-faint); margin-top:3px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .rec .rmeta .mtag{ font-family:var(--sketch); }
  .rec .rpattern{ flex:0 1 auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* day-of-week chips */
  .days{ display:flex; gap:3px; }
  .day{ width:23px; height:23px; border-radius:6px; border:1.5px solid var(--line-soft); display:grid; place-items:center; font-size:10.5px; font-weight:600; color:var(--ink-faint); background:var(--box); }
  .day.on{ background:var(--ink); color:var(--box); border-color:var(--ink); }
  /* time-of-day pill */
  .tod{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); border:1.5px solid var(--line-soft); border-radius:20px; padding:3px 9px; background:var(--fill-2); white-space:nowrap; }
  .tod svg{ width:12px; height:12px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  /* pattern text (monthly/yearly) */
  .ptext{ font-size:12.5px; font-weight:600; color:var(--ink); border:1.5px solid var(--line-soft); border-radius:7px; padding:5px 11px; background:var(--fill-2); white-space:nowrap; }
  .cat{ font-size:10.5px; font-family:var(--sketch); color:var(--ink-soft); border:1.5px solid var(--line-soft); border-radius:20px; padding:2px 9px; background:var(--box); white-space:nowrap; }

  .rec .rtools{ display:flex; gap:6px; flex:none; margin-left:auto; }
  .rtool{ width:28px; height:28px; border:1.5px solid var(--line-soft); border-radius:7px; background:var(--box); display:grid; place-items:center; cursor:pointer; }
  .rtool svg{ width:14px; height:14px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .rtool:hover{ border-color:var(--ink); } .rtool:hover svg{ stroke:var(--ink); }

  .list-foot{ display:flex; align-items:center; gap:12px; margin-top:14px; }
  .list-foot .lf-count{ font-family:var(--sketch); font-size:13px; color:var(--ink-soft); }
  .list-foot .spacer{ flex:1; }

  /* ===== inline add/edit form ===== */
  .editform{ position:relative; border:2px solid var(--pin); border-radius:10px; background:var(--pin-bg); padding:16px 18px 18px; margin-bottom:14px; }
  .editform .ef-head{ display:flex; align-items:center; gap:9px; margin-bottom:14px; }
  .editform .ef-head .eh-ic{ width:24px; height:24px; border:1.75px solid var(--pin); border-radius:7px; display:grid; place-items:center; background:var(--box); }
  .editform .ef-head .eh-ic svg{ width:14px; height:14px; stroke:var(--pin); fill:none; stroke-width:2; }
  .editform .ef-head .eh-t{ font-size:15px; font-weight:700; color:var(--pin); }
  .editform .ef-head .eh-x{ width:24px; height:24px; border:1.5px solid var(--line); border-radius:7px; display:grid; place-items:center; cursor:pointer; background:var(--box); }
  .editform .ef-head .eh-x svg{ width:13px; height:13px; stroke:var(--ink-soft); fill:none; stroke-width:2; }
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .field .flab{ font-family:var(--sketch); font-size:12.5px; color:var(--ink-soft); }
  .field .flab .opt{ color:var(--ink-faint); }
  .inp{ border:1.75px solid var(--line); background:var(--box); border-radius:8px; padding:10px 12px; font-family:var(--ui); font-size:14px; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .inp.placeholder{ color:var(--ink-faint); }
  .inp.area{ min-height:54px; align-items:flex-start; }
  .ef-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  /* priority radio */
  .prio-pick{ display:flex; gap:9px; }
  .prio{ display:flex; align-items:center; gap:7px; border:1.75px solid var(--line); border-radius:8px; padding:7px 11px; cursor:pointer; background:var(--box); font-size:12px; color:var(--ink-soft); }
  .prio .pdot{ width:13px; height:13px; }
  .prio.on{ border-color:var(--ink); color:var(--ink); font-weight:600; box-shadow:inset 0 0 0 1px var(--ink); }
  /* type segmented */
  .typeseg{ display:flex; border:1.75px solid var(--ink); border-radius:8px; overflow:hidden; width:fit-content; }
  .typeseg button{ font-family:var(--ui); font-size:13px; font-weight:500; color:var(--ink-soft); background:var(--box); border:none; border-right:1.5px solid var(--line-soft); padding:8px 16px; cursor:pointer; }
  .typeseg button:last-child{ border-right:none; }
  .typeseg button.on{ background:var(--ink); color:var(--box); font-weight:600; }
  /* day picker (bigger) */
  .daypick{ display:flex; gap:6px; }
  .daypick .day{ width:34px; height:34px; font-size:12px; cursor:pointer; }
  /* tod pick */
  .todpick{ display:flex; gap:8px; }
  .todopt{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft); border:1.75px solid var(--line); border-radius:8px; padding:7px 13px; cursor:pointer; background:var(--box); }
  .todopt svg{ width:14px; height:14px; stroke:var(--ink-soft); fill:none; stroke-width:1.9; }
  .todopt.on{ border-color:var(--ink); color:var(--ink); font-weight:600; box-shadow:inset 0 0 0 1px var(--ink); }
  .todopt.on svg{ stroke:var(--ink); }
  .ef-actions{ display:flex; align-items:center; gap:10px; margin-top:4px; }
  .ef-actions .spacer{ flex:1; }

  /* ===== injections preview ===== */
  .injwrap{ padding:15px 17px 16px; }
  .injgroup{ margin-bottom:16px; }
  .injgroup:last-child{ margin-bottom:0; }
  .injgroup .ig-head{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .injgroup .ig-head .ig-t{ font-size:13px; font-weight:700; }
  .injgroup .ig-head .ig-c{ font-family:var(--sketch); font-size:11.5px; color:var(--ink-faint); }
  .injgroup .ig-head .spacer{ flex:1; }
  .injgroup .ig-head .ig-link{ font-family:var(--sketch); font-size:11.5px; color:var(--pin); cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
  .injgroup .ig-head .ig-link svg{ width:12px; height:12px; stroke:var(--pin); fill:none; stroke-width:2; }
  .inj{ display:flex; align-items:center; gap:10px; padding:7px 9px; border:1.5px solid var(--line-soft); border-radius:8px; background:var(--box); margin-bottom:7px; }
  .inj:last-child{ margin-bottom:0; }
  .inj .ibox{ width:17px; height:17px; border:1.75px solid var(--line); border-radius:5px; flex:none; display:grid; place-items:center; }
  .inj .ibox svg{ width:11px; height:11px; stroke:var(--box); fill:none; stroke-width:2.4; }
  .inj.done .ibox{ background:var(--green); border-color:var(--green); }
  .inj .ititle{ flex:1; font-size:12.5px; color:var(--ink); }
  .inj.done .ititle{ color:var(--ink-faint); text-decoration:line-through; }
  .inj .iwhen{ font-size:10.5px; color:var(--ink-faint); font-family:var(--sketch); white-space:nowrap; }

  /* ===== injection history table ===== */
  .histwrap{ padding:16px 18px 16px; margin-top:22px; }
  table.hist{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.hist th{ text-align:left; font-family:var(--sketch); font-weight:400; font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; padding:7px 10px; border-bottom:2px solid var(--line); }
  table.hist td{ padding:9px 10px; border-bottom:1.25px dashed var(--line-soft); color:var(--ink); }
  table.hist tr:last-child td{ border-bottom:none; }
  table.hist .td-date{ font-weight:600; white-space:nowrap; }
  table.hist .td-task{ display:flex; align-items:center; gap:8px; }
  .badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; border-radius:20px; padding:2px 9px; border:1.5px solid; white-space:nowrap; }
  .badge svg{ width:11px; height:11px; stroke-width:2.4; fill:none; }
  .badge.yes{ color:var(--green); border-color:var(--green); background:rgba(58,168,97,.08); } .badge.yes svg{ stroke:var(--green); }
  .badge.no{ color:var(--ink-faint); border-color:var(--line); background:var(--fill-2); }
  .badge.miss{ color:var(--red); border-color:var(--red); background:rgba(214,69,60,.07); } .badge.miss svg{ stroke:var(--red); }
  .badge.pend{ color:var(--orange); border-color:var(--orange); background:rgba(224,123,26,.08); }

  /* ===== legend ===== */
  .legend{ position:fixed; right:18px; bottom:18px; z-index:60; width:360px; background:var(--box); border:2px solid var(--pin); border-radius:13px; box-shadow:0 14px 36px rgba(44,42,38,.24); overflow:hidden; display:none; }
  body.annotated .legend{ display:block; }
  .legend-h{ background:var(--pin); color:#fff; padding:9px 14px; font-family:var(--sketch); font-size:15px; display:flex; align-items:center; justify-content:space-between; }
  .legend-h .x{ cursor:pointer; opacity:.85; font-size:18px; line-height:1; }
  .legend-b{ padding:10px 14px 13px; max-height:58vh; overflow:auto; }
  .lg{ display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-soft); }
  .lg:last-child{ border-bottom:none; }
  .lg .n{ flex:none; width:21px; height:21px; border-radius:50%; background:var(--pin-bg); color:var(--pin); border:1.5px solid var(--pin); display:grid; place-items:center; font-family:var(--sketch); font-size:12px; }
  .lg .t{ font-size:12px; color:var(--ink); line-height:1.42; }
  .lg .t b{ font-weight:600; }

  /* priority key chip in header of list */
  .prio-key{ display:flex; align-items:center; gap:12px; }
  .pk{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); }
</style>
</head>
<body class="annotated">

  <div class="toolbar">
    <div class="brand"><b>BuJo Digital</b><span>· Recurrents Engine — lo-fi wireframe</span></div>
    <div class="spacer"></div>
    <div class="toggle on" id="annoToggle"><span class="sw"></span>Annotations</div>
  </div>

  <div class="stage">
    <div class="app">
      <nav class="rail" id="rail"></nav>
      <div class="main" id="main"></div>
    </div>
  </div>

  <aside class="legend" id="legend">
    <div class="legend-h">Annotations — what &amp; why <span class="x" id="legendX">×</span></div>
    <div class="legend-b" id="legendBody"></div>
  </aside>

<script src="recurrents.js"></script>
</body>
</html>
